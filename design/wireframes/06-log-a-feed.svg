<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1194 834"
     font-family="'Source Serif 4', 'Georgia', serif" font-size="14">

  <!-- Dimmed background -->
  <rect width="1194" height="834" fill="#FEFBF5"/>
  <rect width="1194" height="834" fill="#2A1A10" opacity="0.45"/>

  <!-- ==================== MODAL ==================== -->
  <rect x="337" y="37" width="520" height="762" rx="16" fill="#FEFBF5"
        stroke="#E5DDD0" stroke-width="0.5"/>
  <rect x="572" y="46" width="50" height="4" rx="2" fill="#D9CEBD"/>

  <!-- ==================== HEADER ==================== -->
  <text x="597" y="80" text-anchor="middle" font-size="18" font-weight="700"
        fill="#4A3228" font-family="'Fraunces', 'Georgia', serif">Log a Feed</text>
  <text x="597" y="96" text-anchor="middle" font-size="12" fill="#8B7355">Rye Baby</text>
  <line x1="357" y1="108" x2="837" y2="108" stroke="#E5DDD0"/>

  <!-- ==================== 1. PREVIOUS FEED (first section) ==================== -->
  <text x="357" y="128" font-size="10" font-weight="600" fill="#8B7355"
        letter-spacing="1">PREVIOUS FEED</text>

  <!-- Horizontal flow: [Prev pill] —— ✕ —— [This feed pill]
       Prev pill: x=357, w=188  |  Connector: 545→649  |  This pill: x=649, w=188 -->

  <!-- Previous feed pill (left) -->
  <rect x="357" y="138" width="188" height="28" rx="14" fill="#F2EBE0" stroke="#D9CEBD"/>
  <circle cx="373" cy="152" r="4" fill="#7A9178"/>
  <text x="385" y="156" font-size="11" fill="#4A3228">Mar 17, 7:00 AM</text>

  <!-- Connector line left segment -->
  <line x1="545" y1="152" x2="575" y2="152" stroke="#C07A2E" stroke-width="1.5"/>

  <!-- Break/reconnect control (centered at x=597) -->
  <circle cx="597" cy="152" r="14" fill="#F2EBE0" stroke="#C07A2E" stroke-width="1.5"/>
  <text x="597" y="156" text-anchor="middle" font-size="11" fill="#8B7355">✕</text>

  <!-- Connector line right segment -->
  <line x1="619" y1="152" x2="649" y2="152" stroke="#C07A2E" stroke-width="1.5"/>

  <!-- This feed pill (right) -->
  <rect x="649" y="138" width="188" height="28" rx="14" fill="#FDF6EC"
        stroke="#C07A2E" stroke-width="1.5"/>
  <circle cx="665" cy="152" r="4" fill="#C07A2E"/>
  <text x="677" y="156" font-size="11" font-weight="600" fill="#4A3228">This feed</text>
  <text x="740" y="156" font-size="10" fill="#8B7355">· Now</text>

  <!-- "from previous feed" label below connector -->
  <text x="597" y="180" text-anchor="middle" font-size="10" fill="#C07A2E"
        font-style="italic">from previous feed</text>

  <!-- Observations (always visible) -->
  <text x="357" y="200" font-size="11" fill="#B8A898">How did the previous cycle go?</text>
  <rect x="357" y="208" width="480" height="44" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="373" y="234" font-size="12" fill="#4A3228">Doubled nicely in ~5h, good aroma…</text>

  <line x1="357" y1="266" x2="837" y2="266" stroke="#E5DDD0"/>

  <!-- ==================== 2. PRESETS ==================== -->
  <text x="357" y="286" font-size="10" font-weight="600" fill="#8B7355"
        letter-spacing="1">PRESET</text>

  <!-- Standard (selected): 148w, 10px gaps -->
  <rect x="357" y="296" width="148" height="38" rx="8" fill="#FDF6EC"
        stroke="#C07A2E" stroke-width="2"/>
  <text x="431" y="312" text-anchor="middle" font-size="12" font-weight="600"
        fill="#4A3228">Standard</text>
  <text x="431" y="326" text-anchor="middle" font-size="10" fill="#C07A2E">2 : 2 : 1</text>

  <!-- Overnight -->
  <rect x="515" y="296" width="148" height="38" rx="8" fill="#F2EBE0" stroke="#D9CEBD"/>
  <text x="589" y="312" text-anchor="middle" font-size="12" fill="#4A3228">Overnight</text>
  <text x="589" y="326" text-anchor="middle" font-size="10" fill="#8B7355">20 : 20 : 1</text>

  <!-- Revival -->
  <rect x="673" y="296" width="148" height="38" rx="8" fill="#F2EBE0" stroke="#D9CEBD"/>
  <text x="747" y="312" text-anchor="middle" font-size="12" fill="#4A3228">Revival</text>
  <text x="747" y="326" text-anchor="middle" font-size="10" fill="#8B7355">Protocol</text>

  <!-- ==================== 3. FLOUR(S) ==================== -->
  <text x="357" y="358" font-size="10" font-weight="600" fill="#8B7355"
        letter-spacing="1">FLOUR(S)</text>
  <text x="420" y="358" font-size="9" fill="#B8A898" font-style="italic">from last feed</text>

  <!-- Flour row 1: dropdown 260w + 10gap + input 100w -->
  <rect x="357" y="368" width="260" height="34" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="373" y="389" font-size="13" fill="#4A3228">AP Flour</text>
  <text x="601" y="389" text-anchor="end" font-size="11" fill="#8B7355">&#9660;</text>
  <rect x="627" y="368" width="100" height="34" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="677" y="389" text-anchor="middle" font-size="14" font-weight="600"
        fill="#4A3228">125</text>
  <text x="737" y="389" font-size="12" fill="#8B7355">g</text>

  <!-- Flour row 2 -->
  <rect x="357" y="408" width="260" height="34" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="373" y="429" font-size="13" fill="#4A3228">Rye</text>
  <text x="601" y="429" text-anchor="end" font-size="11" fill="#8B7355">&#9660;</text>
  <rect x="627" y="408" width="100" height="34" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="677" y="429" text-anchor="middle" font-size="14" font-weight="600"
        fill="#4A3228">25</text>
  <text x="737" y="429" font-size="12" fill="#8B7355">g</text>
  <text x="753" y="430" font-size="14" fill="#D9CEBD">&#10005;</text>

  <!-- Add flour -->
  <text x="357" y="460" font-size="13" fill="#C07A2E">+ Add Flour</text>

  <!-- ==================== 4. WATER ==================== -->
  <text x="357" y="488" font-size="10" font-weight="600" fill="#8B7355"
        letter-spacing="1">WATER</text>

  <!-- Amount: y=498, h=34, center=515, baseline=517 -->
  <rect x="357" y="498" width="100" height="34" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="407" y="519" text-anchor="middle" font-size="14" font-weight="600"
        fill="#4A3228">150</text>
  <text x="467" y="519" font-size="12" fill="#8B7355">g</text>

  <!-- Type radios — cy=515 -->
  <circle cx="510" cy="515" r="7" fill="none" stroke="#C07A2E" stroke-width="1.5"/>
  <circle cx="510" cy="515" r="3.5" fill="#C07A2E"/>
  <text x="524" y="519" font-size="13" fill="#4A3228">Tap</text>
  <circle cx="576" cy="515" r="7" fill="none" stroke="#D9CEBD" stroke-width="1.5"/>
  <text x="590" y="519" font-size="13" fill="#8B7355">Filtered</text>

  <!-- Water temp — y=500, h=30, center=515 -->
  <text x="665" y="519" font-size="12" fill="#8B7355">Temp:</text>
  <rect x="710" y="500" width="72" height="30" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="746" y="519" text-anchor="middle" font-size="14" font-weight="600"
        fill="#4A3228">80</text>
  <text x="790" y="519" font-size="12" fill="#8B7355">°F</text>

  <line x1="357" y1="546" x2="837" y2="546" stroke="#E5DDD0"/>

  <!-- ==================== 5. ADD DETAILS (toggle tray) ==================== -->
  <!-- TODO: Refine this progressive disclosure design -->
  <text x="357" y="566" font-size="10" font-weight="600" fill="#8B7355"
        letter-spacing="1">ADD DETAILS</text>

  <!-- Tray: w=480, h=42, rx=21 -->
  <rect x="357" y="576" width="480" height="42" rx="21" fill="#F0E9DE"/>

  <!-- Pill: Discard (active) -->
  <rect x="361" y="580" width="112" height="34" rx="17" fill="#C07A2E"/>
  <text x="417" y="602" text-anchor="middle" font-size="12" font-weight="600"
        fill="#FFFFFF">Discard</text>

  <!-- Pill: Photos (inactive) -->
  <rect x="481" y="580" width="112" height="34" rx="17" fill="#FEFBF5"/>
  <text x="537" y="602" text-anchor="middle" font-size="12" fill="#8B7355">Photos</text>

  <!-- Pill: Temps (inactive) -->
  <rect x="601" y="580" width="112" height="34" rx="17" fill="#FEFBF5"/>
  <text x="657" y="602" text-anchor="middle" font-size="12" fill="#8B7355">Temps</text>

  <!-- Pill: Notes (inactive) -->
  <rect x="721" y="580" width="112" height="34" rx="17" fill="#FEFBF5"/>
  <text x="777" y="602" text-anchor="middle" font-size="12" fill="#8B7355">Notes</text>

  <!-- Expanded: Discard card with left accent -->
  <rect x="357" y="626" width="480" height="34" rx="8" fill="#FDF6EC"/>
  <rect x="357" y="626" width="3" height="34" rx="1.5" fill="#C07A2E"/>
  <rect x="373" y="634" width="18" height="18" rx="3" fill="#FFFFFF"
        stroke="#C07A2E" stroke-width="1.5"/>
  <text x="382" y="648" text-anchor="middle" font-size="12" fill="#C07A2E"
        font-weight="700">&#10003;</text>
  <text x="400" y="648" font-size="13" fill="#4A3228">Saved discard</text>
  <text x="530" y="648" font-size="12" fill="#8B7355">Amount:</text>
  <rect x="590" y="635" width="72" height="20" rx="4" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="626" y="649" text-anchor="middle" font-size="12" fill="#4A3228">75</text>
  <text x="670" y="649" font-size="11" fill="#8B7355">g</text>

  <!-- ==================== 6. WHEN ==================== -->
  <line x1="357" y1="674" x2="837" y2="674" stroke="#E5DDD0"/>
  <text x="357" y="694" font-size="10" font-weight="600" fill="#8B7355"
        letter-spacing="1">WHEN</text>

  <!-- Now radio: cy=712 -->
  <circle cx="369" cy="712" r="6" fill="none" stroke="#C07A2E" stroke-width="1.5"/>
  <circle cx="369" cy="712" r="3" fill="#C07A2E"/>
  <text x="384" y="716" font-size="13" fill="#4A3228">Now</text>
  <text x="420" y="716" font-size="11" fill="#8B7355">(Mar 18, 8:30 AM)</text>

  <!-- Earlier radio -->
  <circle cx="570" cy="712" r="6" fill="none" stroke="#D9CEBD" stroke-width="1.5"/>
  <text x="585" y="716" font-size="13" fill="#8B7355">Earlier…</text>

  <!-- ==================== 7. FOOTER ==================== -->
  <line x1="357" y1="736" x2="837" y2="736" stroke="#E5DDD0"/>

  <!-- Save: y=748, h=40, center=768, text baseline=772 -->
  <text x="370" y="772" font-size="14" fill="#8B7355">Cancel</text>

  <!-- Save — large primary, right-aligned -->
  <rect x="717" y="748" width="120" height="40" rx="10" fill="#C07A2E"/>
  <text x="777" y="772" text-anchor="middle" font-size="16" font-weight="700"
        fill="#FFFFFF">Save Feed</text>

</svg>
