<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1194 834"
     font-family="'Source Serif 4', 'Georgia', serif" font-size="14">

  <!-- Background -->
  <rect width="1194" height="834" fill="#FEFBF5"/>

  <!-- ==================== TOP NAV BAR ==================== -->
  <rect x="0" y="0" width="1194" height="56" fill="#FEFBF5"/>
  <line x1="0" y1="56" x2="1194" y2="56" stroke="#E5DDD0"/>
  <text x="32" y="37" font-size="18" font-weight="700" fill="#4A3228"
        font-family="'Fraunces', 'Georgia', serif">Log a Feed — Rye Baby</text>

  <!-- Save / Cancel -->
  <rect x="1036" y="14" width="72" height="30" rx="6" fill="#C07A2E"/>
  <text x="1072" y="33" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">Save</text>
  <rect x="1116" y="14" width="64" height="30" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="1148" y="33" text-anchor="middle" font-size="13" fill="#8B7355">Cancel</text>

  <!-- ==================== VERTICAL DIVIDER ==================== -->
  <line x1="597" y1="72" x2="597" y2="820" stroke="#E5DDD0"/>

  <!-- ==================== LEFT COLUMN (50%) ==================== -->

  <!-- Preset shortcuts -->
  <text x="32" y="92" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">PRESET SHORTCUTS</text>

  <rect x="32" y="104" width="164" height="44" rx="8" fill="#FDF6EC" stroke="#C07A2E" stroke-width="2"/>
  <text x="114" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#4A3228">Standard</text>
  <text x="114" y="138" text-anchor="middle" font-size="11" fill="#8B7355">2:2:1</text>

  <rect x="208" y="104" width="164" height="44" rx="8" fill="#F2EBE0" stroke="#E5DDD0"/>
  <text x="290" y="122" text-anchor="middle" font-size="13" fill="#4A3228">Overnight</text>
  <text x="290" y="138" text-anchor="middle" font-size="11" fill="#8B7355">20:20:1</text>

  <rect x="384" y="104" width="164" height="44" rx="8" fill="#F2EBE0" stroke="#E5DDD0"/>
  <text x="466" y="122" text-anchor="middle" font-size="13" fill="#4A3228">Revival</text>
  <text x="466" y="138" text-anchor="middle" font-size="11" fill="#8B7355">Protocol</text>

  <!-- Flour(s) -->
  <text x="32" y="180" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">FLOUR(S)</text>

  <rect x="32" y="192" width="240" height="36" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="48" y="215" font-size="13" fill="#4A3228">AP Flour</text>
  <text x="252" y="215" text-anchor="end" font-size="12" fill="#8B7355">&#9660;</text>

  <rect x="284" y="192" width="120" height="36" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="344" y="215" text-anchor="middle" font-size="14" font-weight="600" fill="#4A3228">125</text>
  <text x="392" y="215" font-size="12" fill="#8B7355">g</text>

  <rect x="32" y="236" width="240" height="36" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="48" y="259" font-size="13" fill="#4A3228">Rye</text>
  <text x="252" y="259" text-anchor="end" font-size="12" fill="#8B7355">&#9660;</text>

  <rect x="284" y="236" width="120" height="36" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="344" y="259" text-anchor="middle" font-size="14" font-weight="600" fill="#4A3228">25</text>
  <text x="392" y="259" font-size="12" fill="#8B7355">g</text>

  <text x="420" y="259" font-size="14" fill="#D9CEBD">&#10005;</text>

  <text x="32" y="294" font-size="13" fill="#C07A2E">+ Add Flour</text>

  <!-- Water -->
  <text x="32" y="328" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">WATER</text>

  <text x="32" y="352" font-size="13" fill="#8B7355">Amount</text>
  <rect x="100" y="336" width="120" height="36" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="160" y="359" text-anchor="middle" font-size="14" font-weight="600" fill="#4A3228">150</text>
  <text x="228" y="359" font-size="12" fill="#8B7355">g</text>

  <text x="268" y="352" font-size="13" fill="#8B7355">Type:</text>
  <circle cx="318" cy="352" r="7" fill="none" stroke="#C07A2E" stroke-width="1.5"/>
  <circle cx="318" cy="352" r="3.5" fill="#C07A2E"/>
  <text x="334" y="357" font-size="13" fill="#4A3228">Tap</text>
  <circle cx="390" cy="352" r="7" fill="none" stroke="#D9CEBD" stroke-width="1.5"/>
  <text x="406" y="357" font-size="13" fill="#8B7355">Filtered</text>

  <line x1="32" y1="380" x2="560" y2="380" stroke="#E5DDD0"/>

  <!-- Previous feed chain -->
  <text x="32" y="408" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">PREVIOUS FEED</text>

  <circle cx="46" cy="432" r="7" fill="none" stroke="#C07A2E" stroke-width="1.5"/>
  <circle cx="46" cy="432" r="3.5" fill="#C07A2E"/>
  <text x="62" y="437" font-size="13" fill="#4A3228">Chained to last feed</text>
  <text x="220" y="437" font-size="12" fill="#8B7355">(Mar 17, 7:00 AM)</text>

  <circle cx="46" cy="462" r="7" fill="none" stroke="#D9CEBD" stroke-width="1.5"/>
  <text x="62" y="467" font-size="13" fill="#8B7355">Missed a feed (break chain)</text>

  <!-- Observations -->
  <text x="32" y="500" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">OBSERVATIONS ON LAST FEED</text>
  <text x="32" y="516" font-size="11" fill="#B8A898">How did the previous cycle go?</text>
  <rect x="32" y="524" width="533" height="64" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="48" y="548" font-size="13" fill="#4A3228">Doubled nicely in about 5h, good aroma,</text>
  <text x="48" y="566" font-size="13" fill="#4A3228">slight tang...</text>

  <!-- Notes -->
  <text x="32" y="616" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">NOTES</text>
  <rect x="32" y="628" width="533" height="56" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="48" y="654" font-size="13" fill="#B8A898">Used KA bread flour + rye...</text>

  <!-- ==================== RIGHT COLUMN (50%) ==================== -->

  <!-- Temperatures -->
  <text x="629" y="92" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">TEMPERATURES</text>

  <text x="629" y="118" font-size="13" fill="#4A3228">Water temp</text>
  <rect x="780" y="102" width="100" height="32" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="830" y="123" text-anchor="middle" font-size="14" font-weight="600" fill="#4A3228">80</text>
  <text x="892" y="123" font-size="12" fill="#8B7355">°F</text>

  <text x="629" y="158" font-size="13" fill="#8B7355">Starter temp (optional)</text>
  <rect x="780" y="142" width="100" height="32" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="830" y="163" text-anchor="middle" font-size="14" fill="#B8A898">72</text>
  <text x="892" y="163" font-size="12" fill="#8B7355">°F</text>

  <text x="629" y="198" font-size="13" fill="#8B7355">Ambient temp (optional)</text>
  <rect x="780" y="182" width="100" height="32" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="830" y="203" text-anchor="middle" font-size="14" fill="#B8A898">70</text>
  <text x="892" y="203" font-size="12" fill="#8B7355">°F</text>

  <line x1="629" y1="232" x2="1152" y2="232" stroke="#E5DDD0"/>

  <!-- Discard -->
  <text x="629" y="260" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">DISCARD</text>

  <rect x="629" y="272" width="18" height="18" rx="3" fill="#FFFFFF" stroke="#C07A2E" stroke-width="1.5"/>
  <text x="638" y="287" font-size="13" fill="#C07A2E" font-weight="700">&#10003;</text>
  <text x="656" y="287" font-size="13" fill="#4A3228">Discard was saved</text>

  <text x="629" y="316" font-size="13" fill="#8B7355">Amount:</text>
  <rect x="700" y="300" width="100" height="32" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="750" y="321" text-anchor="middle" font-size="14" fill="#4A3228">75</text>
  <text x="812" y="321" font-size="12" fill="#8B7355">g (optional)</text>

  <line x1="629" y1="350" x2="1152" y2="350" stroke="#E5DDD0"/>

  <!-- Photos -->
  <text x="629" y="378" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">PHOTOS</text>

  <rect x="629" y="392" width="100" height="80" rx="6" fill="#F2EBE0"/>
  <line x1="629" y1="392" x2="729" y2="472" stroke="#D9CEBD" stroke-width="0.5"/>
  <line x1="729" y1="392" x2="629" y2="472" stroke="#D9CEBD" stroke-width="0.5"/>
  <text x="679" y="436" text-anchor="middle" font-size="10" fill="#B8A898">Photo 1</text>

  <rect x="741" y="392" width="100" height="80" rx="6" fill="#F2EBE0"/>
  <line x1="741" y1="392" x2="841" y2="472" stroke="#D9CEBD" stroke-width="0.5"/>
  <line x1="841" y1="392" x2="741" y2="472" stroke="#D9CEBD" stroke-width="0.5"/>
  <text x="791" y="436" text-anchor="middle" font-size="10" fill="#B8A898">Photo 2</text>

  <rect x="853" y="392" width="100" height="80" rx="6" fill="#F2EBE0" stroke="#D9CEBD" stroke-dasharray="4 3"/>
  <text x="903" y="432" text-anchor="middle" font-size="20" fill="#D9CEBD">+</text>
  <text x="903" y="452" text-anchor="middle" font-size="10" fill="#B8A898">Add</text>

  <line x1="629" y1="492" x2="1152" y2="492" stroke="#E5DDD0"/>

  <!-- Timestamp -->
  <text x="629" y="520" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">TIMESTAMP</text>

  <circle cx="643" cy="544" r="7" fill="none" stroke="#C07A2E" stroke-width="1.5"/>
  <circle cx="643" cy="544" r="3.5" fill="#C07A2E"/>
  <text x="659" y="549" font-size="13" fill="#4A3228">Now</text>
  <text x="700" y="549" font-size="12" fill="#8B7355">(Mar 18, 8:30 AM)</text>

  <circle cx="643" cy="574" r="7" fill="none" stroke="#D9CEBD" stroke-width="1.5"/>
  <text x="659" y="579" font-size="13" fill="#8B7355">Earlier today</text>

  <rect x="760" y="560" width="200" height="32" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="776" y="581" font-size="13" fill="#B8A898">Select date &amp; time</text>

</svg>