<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1194 834"
     font-family="'Source Serif 4', 'Georgia', serif" font-size="14">

  <!-- Background -->
  <rect width="1194" height="834" fill="#FEFBF5"/>

  <!-- ==================== TOP BAR ==================== -->
  <rect x="0" y="0" width="1194" height="60" fill="#FEFBF5"/>
  <line x1="0" y1="60" x2="1194" y2="60" stroke="#E4D9C8"/>

  <!-- Title -->
  <text x="36" y="30" font-size="17" font-weight="600" fill="#4A3228"
        font-family="'Fraunces', 'Georgia', serif">Baking: <tspan font-weight="400" fill="#8B7355">No-Knead PAL</tspan></text>
  <text x="36" y="48" font-size="11" fill="#A89478">Step 3 of 7</text>

  <!-- End Bake button -->
  <rect x="1052" y="16" width="110" height="32" rx="9" fill="#FFFFFF" stroke="#E4D9C8" stroke-width="1.5"/>
  <line x1="1074" y1="26" x2="1082" y2="34" stroke="#8B7355" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1082" y1="26" x2="1074" y2="34" stroke="#8B7355" stroke-width="1.5" stroke-linecap="round"/>
  <text x="1094" y="37" font-size="12.5" fill="#8B7355">End Bake</text>

  <!-- ==================== LEFT PANEL (55%) ==================== -->
  <line x1="657" y1="60" x2="657" y2="834" stroke="#E4D9C8"/>

  <!-- Step Name -->
  <text x="328" y="110" text-anchor="middle" font-size="26" font-weight="600" fill="#4A3228"
        font-family="'Fraunces', 'Georgia', serif">Coil Fold + Bulk Proof</text>

  <!-- Timer Ring -->
  <g transform="translate(198, 140)">
    <!-- Background ring -->
    <circle cx="130" cy="130" r="120" fill="none" stroke="#F2EBE0" stroke-width="6"/>
    <!-- Progress ring (about 10% elapsed) -->
    <circle cx="130" cy="130" r="120" fill="none" stroke="#C07A2E" stroke-width="6"
            stroke-linecap="round" stroke-dasharray="75 679"
            transform="rotate(-90 130 130)"/>
    <!-- Tick marks (12 major) -->
    <g stroke="#E4D9C8" opacity="0.3">
      <line x1="130" y1="4" x2="130" y2="14" stroke-width="1.5"/>
      <line x1="256" y1="130" x2="246" y2="130" stroke-width="1.5"/>
      <line x1="130" y1="256" x2="130" y2="246" stroke-width="1.5"/>
      <line x1="4" y1="130" x2="14" y2="130" stroke-width="1.5"/>
    </g>
    <!-- Time display -->
    <text x="130" y="126" text-anchor="middle" font-size="38" font-weight="500"
          font-family="'Fira Mono', monospace" fill="#4A3228">12:42:15</text>
    <text x="130" y="148" text-anchor="middle" font-size="11" fill="#A89478"
          letter-spacing="0.08em">remaining</text>
  </g>

  <!-- Timer hint -->
  <text x="328" y="422" text-anchor="middle" font-size="12" fill="#A89478"
        font-style="italic">Done around 7:00 PM</text>

  <!-- Instructions -->
  <text x="328" y="456" text-anchor="middle" font-size="13.5" fill="#8B7355">One set of coil folds, then cover and let proof at room</text>
  <text x="328" y="476" text-anchor="middle" font-size="13.5" fill="#8B7355">temperature (75–78°F) until about doubled in volume.</text>

  <!-- TIP card -->
  <rect x="108" y="498" width="440" height="56" rx="10" fill="rgba(122,145,120,0.08)"
        stroke="rgba(122,145,120,0.12)"/>
  <rect x="122" y="510" width="30" height="18" rx="4" fill="rgba(122,145,120,0.12)"/>
  <text x="137" y="523" text-anchor="middle" font-size="10" font-weight="700" fill="#7A9178"
        font-family="'Fraunces', 'Georgia', serif" letter-spacing="0.08em">TIP</text>
  <text x="164" y="520" font-size="12" fill="#7A9178">Look for 60–100% volume expansion. The dough</text>
  <text x="164" y="536" font-size="12" fill="#7A9178">should be jiggly and domed on top.</text>

  <!-- Controls -->
  <!-- Skip -->
  <rect x="108" y="576" width="90" height="40" rx="10" fill="#FFFFFF" stroke="#E4D9C8" stroke-width="1.5"/>
  <text x="153" y="601" text-anchor="middle" font-size="13.5" fill="#8B7355">⏭ Skip</text>

  <!-- Pause -->
  <rect x="210" y="576" width="100" height="40" rx="10" fill="#FFFFFF" stroke="#E4D9C8" stroke-width="1.5"/>
  <text x="260" y="601" text-anchor="middle" font-size="13.5" fill="#6B4D3E">⏸ Pause</text>

  <!-- Done (primary) -->
  <rect x="322" y="576" width="120" height="40" rx="10" fill="#C07A2E"/>
  <text x="382" y="601" text-anchor="middle" font-size="14" font-weight="600" fill="#FFFFFF"
        font-family="'Fraunces', 'Georgia', serif">Done ✓</text>

  <!-- ==================== RIGHT PANEL (45%, parchment-warm bg) ==================== -->
  <rect x="657" y="60" width="537" height="774" fill="#FAF5EC"/>

  <!-- PROGRESS section -->
  <text x="689" y="92" font-size="11" font-weight="600" fill="#8B7355"
        font-family="'Fraunces', 'Georgia', serif" letter-spacing="0.13em">PROGRESS</text>

  <!-- Timeline line -->
  <line x1="700" y1="108" x2="700" y2="310" stroke="#E4D9C8" stroke-width="1.5"/>

  <!-- Step 1: Mix (completed) -->
  <circle cx="700" cy="116" r="5.5" fill="#5E8A50" stroke="#5E8A50"/>
  <text x="700" y="119" text-anchor="middle" font-size="7" fill="#FFFFFF" font-weight="700">✓</text>
  <text x="718" y="120" font-size="13" fill="#A89478" text-decoration="line-through">Mix</text>
  <text x="1140" y="120" text-anchor="end" font-size="10.5" fill="#A89478"
        font-family="'Fira Mono', monospace">6:00 AM</text>

  <!-- Step 2: Add Salt (completed) -->
  <circle cx="700" cy="146" r="5.5" fill="#5E8A50" stroke="#5E8A50"/>
  <text x="700" y="149" text-anchor="middle" font-size="7" fill="#FFFFFF" font-weight="700">✓</text>
  <text x="718" y="150" font-size="13" fill="#A89478" text-decoration="line-through">Add Salt</text>
  <text x="1140" y="150" text-anchor="end" font-size="10.5" fill="#A89478"
        font-family="'Fira Mono', monospace">6:30 AM</text>

  <!-- Step 3: Coil Fold (current) -->
  <rect x="686" y="165" width="468" height="30" rx="8" fill="rgba(192,122,46,0.08)"/>
  <circle cx="700" cy="180" r="6.5" fill="#C07A2E" stroke="#C07A2E"/>
  <text x="718" y="184" font-size="13" font-weight="600" fill="#4A3228">Coil Fold + Bulk Proof</text>
  <text x="1140" y="184" text-anchor="end" font-size="10.5" font-weight="500" fill="#C07A2E"
        font-family="'Fira Mono', monospace">7:00 AM</text>

  <!-- Step 4-7 (upcoming) -->
  <circle cx="700" cy="214" r="5.5" fill="#FFFFFF" stroke="#E4D9C8" stroke-width="2"/>
  <text x="718" y="218" font-size="13" fill="#8B7355">Preshape</text>
  <text x="1140" y="218" text-anchor="end" font-size="10.5" fill="#A89478"
        font-family="'Fira Mono', monospace">7:00 PM</text>

  <circle cx="700" cy="244" r="5.5" fill="#FFFFFF" stroke="#E4D9C8" stroke-width="2"/>
  <text x="718" y="248" font-size="13" fill="#8B7355">Final Shape</text>
  <text x="1140" y="248" text-anchor="end" font-size="10.5" fill="#A89478"
        font-family="'Fira Mono', monospace">7:30 PM</text>

  <circle cx="700" cy="274" r="5.5" fill="#FFFFFF" stroke="#E4D9C8" stroke-width="2"/>
  <text x="718" y="278" font-size="13" fill="#8B7355">Cold Proof</text>
  <text x="1140" y="278" text-anchor="end" font-size="10.5" fill="#A89478"
        font-family="'Fira Mono', monospace">8:00 PM</text>

  <circle cx="700" cy="304" r="5.5" fill="#FFFFFF" stroke="#E4D9C8" stroke-width="2"/>
  <text x="718" y="308" font-size="13" fill="#8B7355">Bake!</text>
  <text x="1140" y="308" text-anchor="end" font-size="10.5" fill="#A89478"
        font-family="'Fira Mono', monospace">4:00 AM</text>

  <!-- Separator -->
  <line x1="689" y1="328" x2="1154" y2="328" stroke="#E4D9C8"/>

  <!-- INGREDIENTS section -->
  <text x="689" y="354" font-size="11" font-weight="600" fill="#8B7355"
        font-family="'Fraunces', 'Georgia', serif" letter-spacing="0.13em">INGREDIENTS</text>

  <!-- Checked items (used in Mix) -->
  <rect x="689" y="366" width="465" height="28" rx="4" fill="rgba(122,145,120,0.08)"/>
  <text x="705" y="385" font-size="12.5" fill="#A89478" text-decoration="line-through"><tspan fill="#5E8A50">✓ </tspan>AP Flour</text>
  <text x="1140" y="385" text-anchor="end" font-size="12.5" font-weight="500" fill="#A89478"
        font-family="'Fira Mono', monospace" text-decoration="line-through">472g</text>

  <rect x="689" y="396" width="465" height="28" rx="4" fill="rgba(122,145,120,0.08)"/>
  <text x="705" y="415" font-size="12.5" fill="#A89478" text-decoration="line-through"><tspan fill="#5E8A50">✓ </tspan>Rye Flour</text>
  <text x="1140" y="415" text-anchor="end" font-size="12.5" font-weight="500" fill="#A89478"
        font-family="'Fira Mono', monospace" text-decoration="line-through">25g</text>

  <!-- Checked Water -->
  <text x="705" y="443" font-size="12.5" fill="#A89478" text-decoration="line-through"><tspan fill="#5E8A50">✓ </tspan>Water</text>
  <text x="1140" y="443" text-anchor="end" font-size="12.5" font-weight="500" fill="#A89478"
        font-family="'Fira Mono', monospace" text-decoration="line-through">368g</text>
  <line x1="705" y1="451" x2="1140" y2="451" stroke="#F2EBE0"/>

  <!-- Unchecked Salt -->
  <text x="705" y="471" font-size="12.5" fill="#4A3228">Salt</text>
  <text x="1140" y="471" text-anchor="end" font-size="12.5" font-weight="500" fill="#4A3228"
        font-family="'Fira Mono', monospace">11g</text>
  <line x1="705" y1="479" x2="1140" y2="479" stroke="#F2EBE0"/>

  <!-- Checked Levain -->
  <text x="705" y="499" font-size="12.5" fill="#A89478" text-decoration="line-through"><tspan fill="#5E8A50">✓ </tspan>Levain</text>
  <text x="1140" y="499" text-anchor="end" font-size="12.5" font-weight="500" fill="#A89478"
        font-family="'Fira Mono', monospace" text-decoration="line-through">25g</text>

  <!-- Separator -->
  <line x1="689" y1="518" x2="1154" y2="518" stroke="#E4D9C8"/>

  <!-- TOOLS section -->
  <text x="689" y="544" font-size="11" font-weight="600" fill="#8B7355"
        font-family="'Fraunces', 'Georgia', serif" letter-spacing="0.13em">TOOLS</text>

  <!-- Tool tags -->
  <rect x="689" y="556" width="180" height="26" rx="13" fill="#F2EBE0"/>
  <text x="779" y="574" text-anchor="middle" font-size="11.5" fill="#6B4D3E">📦 Straight-sided container</text>

  <rect x="879" y="556" width="148" height="26" rx="13" fill="#F2EBE0"/>
  <text x="953" y="574" text-anchor="middle" font-size="11.5" fill="#6B4D3E">🧢 Cover or shower cap</text>

  <rect x="689" y="590" width="170" height="26" rx="13" fill="#F2EBE0"/>
  <text x="774" y="608" text-anchor="middle" font-size="11.5" fill="#6B4D3E">🌡️ Instant-read thermometer</text>

  <!-- Next tools hint -->
  <text x="689" y="636" font-size="11" fill="#A89478" font-style="italic">Next: bench scraper, unfloured surface</text>

  <!-- Separator -->
  <line x1="689" y1="654" x2="1154" y2="654" stroke="#E4D9C8"/>

  <!-- NOTES section -->
  <text x="689" y="680" font-size="11" font-weight="600" fill="#8B7355"
        font-family="'Fraunces', 'Georgia', serif" letter-spacing="0.13em">NOTES</text>

  <!-- Quick action buttons -->
  <rect x="689" y="694" width="120" height="34" rx="9" fill="#FFFFFF" stroke="#E4D9C8" stroke-width="1.5"/>
  <text x="749" y="716" text-anchor="middle" font-size="12" fill="#8B7355">📷 Add Photo</text>

  <rect x="821" y="694" width="112" height="34" rx="9" fill="#FFFFFF" stroke="#E4D9C8" stroke-width="1.5"/>
  <text x="877" y="716" text-anchor="middle" font-size="12" fill="#8B7355">📝 Add Note</text>

</svg>