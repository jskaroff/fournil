<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1194 834"
     font-family="'Source Serif 4', 'Georgia', serif" font-size="14">

  <!-- Background -->
  <rect width="1194" height="834" fill="#FEFBF5"/>

  <!-- ==================== TOP NAV BAR ==================== -->
  <rect x="0" y="0" width="1194" height="56" fill="#FEFBF5"/>
  <line x1="0" y1="56" x2="1194" y2="56" stroke="#E5DDD0"/>
  <text x="32" y="30" font-size="18" font-weight="700" fill="#4A3228" font-family="'Fraunces', 'Georgia', serif">Baking: No-Knead PAL</text>
  <text x="32" y="48" font-size="12" fill="#8B7355">Step 3 of 7</text>

  <!-- End Bake button (top-right) -->
  <rect x="1044" y="14" width="118" height="36" rx="8" fill="#FFFFFF" stroke="#A04030" stroke-width="1.5"/>
  <text x="1103" y="37" text-anchor="middle" font-size="13" font-weight="600" fill="#A04030">End Bake</text>

  <!-- ==================== VERTICAL DIVIDER ==================== -->
  <line x1="658" y1="72" x2="658" y2="834" stroke="#E5DDD0"/>

  <!-- ==================== LEFT COLUMN (55%) — CURRENT STEP ==================== -->

  <!-- Step name -->
  <text x="345" y="110" text-anchor="middle" font-size="24" font-weight="700" fill="#4A3228" font-family="'Fraunces', 'Georgia', serif">Coil Fold</text>

  <!-- Timer ring -->
  <circle cx="345" cy="270" r="100" fill="none" stroke="#F2EBE0" stroke-width="8"/>
  <!-- Progress arc (about 40% complete) -->
  <circle cx="345" cy="270" r="100" fill="none" stroke="#C07A2E" stroke-width="8"
          stroke-linecap="round" stroke-dasharray="251 628" stroke-dashoffset="-157"
          transform="rotate(-90, 345, 270)"/>
  <!-- Inner circle background -->
  <circle cx="345" cy="270" r="80" fill="#FEFBF5"/>

  <!-- Time remaining -->
  <text x="345" y="258" text-anchor="middle" font-size="32" font-weight="700" fill="#4A3228" font-family="'Fraunces', 'Georgia', serif">12:42:15</text>
  <text x="345" y="282" text-anchor="middle" font-size="13" fill="#8B7355">remaining</text>
  <text x="345" y="306" text-anchor="middle" font-size="12" fill="#8B7355">Done around 7:00 PM</text>

  <!-- Step instructions -->
  <text x="64" y="420" font-size="14" fill="#4A3228">Do one set of coil folds. Transfer to a</text>
  <text x="64" y="440" font-size="14" fill="#4A3228">straight-sided container. Cover and let sit</text>
  <text x="64" y="460" font-size="14" fill="#4A3228">at room temperature (75-78°F) until about</text>
  <text x="64" y="480" font-size="14" fill="#4A3228">doubled, 12-14h.</text>

  <!-- Tip callout -->
  <rect x="64" y="504" width="556" height="64" rx="8" fill="#FDF6EC" stroke="#C07A2E" stroke-width="0.5"/>
  <text x="80" y="524" font-size="11" font-weight="600" fill="#C07A2E" letter-spacing="1">TIP</text>
  <text x="80" y="544" font-size="13" fill="#8B7355">Look for 60-100% volume expansion. The dough</text>
  <text x="80" y="560" font-size="13" fill="#8B7355">should be jiggly and domed on top.</text>

  <!-- Control buttons -->
  <!-- Skip -->
  <rect x="120" y="600" width="120" height="48" rx="8" fill="#FFFFFF" stroke="#D9CEBD" stroke-width="1"/>
  <text x="180" y="620" text-anchor="middle" font-size="16" fill="#8B7355">&#9654;&#9654;</text>
  <text x="180" y="638" text-anchor="middle" font-size="12" fill="#8B7355">Skip</text>

  <!-- Pause -->
  <rect x="260" y="600" width="120" height="48" rx="8" fill="#FFFFFF" stroke="#D9CEBD" stroke-width="1"/>
  <text x="320" y="620" text-anchor="middle" font-size="16" fill="#8B7355">&#10074;&#10074;</text>
  <text x="320" y="638" text-anchor="middle" font-size="12" fill="#8B7355">Pause</text>

  <!-- Done -->
  <rect x="400" y="600" width="120" height="48" rx="8" fill="#5E8A50" stroke="none"/>
  <text x="460" y="620" text-anchor="middle" font-size="16" fill="#FFFFFF">&#10003;</text>
  <text x="460" y="638" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">Done</text>

  <!-- ==================== RIGHT COLUMN (45%) — OVERVIEW ==================== -->

  <!-- Step Progress -->
  <text x="694" y="92" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">STEP PROGRESS</text>

  <!-- Step 1: Mix (completed) -->
  <g transform="translate(694, 110)">
    <circle cx="10" cy="10" r="10" fill="#5E8A50"/>
    <text x="10" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">&#10003;</text>
    <text x="30" y="15" font-size="13" fill="#8B7355" text-decoration="line-through">Mix (autolyse)</text>
    <text x="300" y="15" text-anchor="end" font-size="12" fill="#8B7355">6:00 AM</text>
  </g>

  <!-- Connector line -->
  <line x1="704" y1="132" x2="704" y2="148" stroke="#E5DDD0" stroke-width="1.5"/>

  <!-- Step 2: Add salt (completed) -->
  <g transform="translate(694, 148)">
    <circle cx="10" cy="10" r="10" fill="#5E8A50"/>
    <text x="10" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">&#10003;</text>
    <text x="30" y="15" font-size="13" fill="#8B7355" text-decoration="line-through">Add salt</text>
    <text x="300" y="15" text-anchor="end" font-size="12" fill="#8B7355">6:30 AM</text>
  </g>

  <line x1="704" y1="170" x2="704" y2="186" stroke="#E5DDD0" stroke-width="1.5"/>

  <!-- Step 3: Coil fold (current) -->
  <g transform="translate(694, 186)">
    <circle cx="10" cy="10" r="12" fill="#C07A2E"/>
    <circle cx="10" cy="10" r="5" fill="#FFFFFF"/>
    <text x="30" y="15" font-size="14" font-weight="600" fill="#4A3228">Coil fold</text>
    <text x="120" y="15" font-size="11" fill="#C07A2E">&#9664; current</text>
    <text x="300" y="15" text-anchor="end" font-size="12" fill="#4A3228" font-weight="600">7:00 AM</text>
  </g>

  <line x1="704" y1="210" x2="704" y2="226" stroke="#E5DDD0" stroke-width="1.5"/>

  <!-- Step 4: Preshape (upcoming) -->
  <g transform="translate(694, 226)">
    <circle cx="10" cy="10" r="10" fill="none" stroke="#D9CEBD" stroke-width="1.5"/>
    <text x="30" y="15" font-size="13" fill="#8B7355">Preshape</text>
    <text x="300" y="15" text-anchor="end" font-size="12" fill="#8B7355">7:00 PM</text>
  </g>

  <line x1="704" y1="248" x2="704" y2="264" stroke="#E5DDD0" stroke-width="1.5"/>

  <!-- Step 5: Final shape (upcoming) -->
  <g transform="translate(694, 264)">
    <circle cx="10" cy="10" r="10" fill="none" stroke="#D9CEBD" stroke-width="1.5"/>
    <text x="30" y="15" font-size="13" fill="#8B7355">Final shape</text>
    <text x="300" y="15" text-anchor="end" font-size="12" fill="#8B7355">7:30 PM</text>
  </g>

  <line x1="704" y1="286" x2="704" y2="302" stroke="#E5DDD0" stroke-width="1.5"/>

  <!-- Step 6: Fridge (upcoming) -->
  <g transform="translate(694, 302)">
    <circle cx="10" cy="10" r="10" fill="none" stroke="#D9CEBD" stroke-width="1.5"/>
    <text x="30" y="15" font-size="13" fill="#8B7355">Fridge</text>
    <text x="300" y="15" text-anchor="end" font-size="12" fill="#8B7355">8:00 PM</text>
  </g>

  <line x1="704" y1="324" x2="704" y2="340" stroke="#E5DDD0" stroke-width="1.5"/>

  <!-- Step 7: Bake! (upcoming) -->
  <g transform="translate(694, 340)">
    <circle cx="10" cy="10" r="10" fill="none" stroke="#D9CEBD" stroke-width="1.5"/>
    <text x="30" y="15" font-size="13" fill="#8B7355">Bake!</text>
    <text x="300" y="15" text-anchor="end" font-size="12" fill="#8B7355">4:00 AM</text>
  </g>

  <!-- Divider -->
  <line x1="694" y1="382" x2="1130" y2="382" stroke="#E5DDD0"/>

  <!-- Ingredients section -->
  <text x="694" y="410" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">INGREDIENTS</text>

  <text x="694" y="438" font-size="13" fill="#4A3228">AP Flour</text>
  <text x="1000" y="438" text-anchor="end" font-size="13" font-weight="600" fill="#4A3228">456g</text>
  <line x1="694" y1="450" x2="1000" y2="450" stroke="#F2EBE0"/>

  <text x="694" y="470" font-size="13" fill="#4A3228">Rye Flour</text>
  <text x="1000" y="470" text-anchor="end" font-size="13" font-weight="600" fill="#4A3228">24g</text>
  <line x1="694" y1="482" x2="1000" y2="482" stroke="#F2EBE0"/>

  <text x="694" y="502" font-size="13" fill="#4A3228">Water</text>
  <text x="1000" y="502" text-anchor="end" font-size="13" font-weight="600" fill="#4A3228">355g</text>
  <line x1="694" y1="514" x2="1000" y2="514" stroke="#F2EBE0"/>

  <text x="694" y="534" font-size="13" fill="#4A3228">Salt</text>
  <text x="1000" y="534" text-anchor="end" font-size="13" font-weight="600" fill="#4A3228">11g</text>
  <line x1="694" y1="546" x2="1000" y2="546" stroke="#F2EBE0"/>

  <text x="694" y="566" font-size="13" fill="#4A3228">Levain</text>
  <text x="1000" y="566" text-anchor="end" font-size="13" font-weight="600" fill="#4A3228">24g</text>

  <!-- Divider -->
  <line x1="694" y1="590" x2="1130" y2="590" stroke="#E5DDD0"/>

  <!-- Media capture buttons -->
  <text x="694" y="618" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">CAPTURE</text>

  <!-- Add Photo -->
  <rect x="694" y="634" width="140" height="40" rx="8" fill="#F2EBE0" stroke="#E5DDD0"/>
  <text x="764" y="659" text-anchor="middle" font-size="13" fill="#4A3228">Add Photo</text>

  <!-- Voice Note -->
  <rect x="848" y="634" width="140" height="40" rx="8" fill="#F2EBE0" stroke="#E5DDD0"/>
  <text x="918" y="659" text-anchor="middle" font-size="13" fill="#4A3228">Voice Note</text>

  <!-- Add Note -->
  <rect x="694" y="686" width="140" height="40" rx="8" fill="#F2EBE0" stroke="#E5DDD0"/>
  <text x="764" y="711" text-anchor="middle" font-size="13" fill="#4A3228">Add Note</text>

</svg>