<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1194 834"
     font-family="'Source Serif 4', 'Georgia', serif" font-size="14">

  <!-- Dimmed background -->
  <rect width="1194" height="834" fill="#FEFBF5"/>
  <rect width="1194" height="834" fill="#2A1A10" opacity="0.45"/>

  <!-- ==================== MODAL SHEET (wider: 720w) ==================== -->
  <rect x="237" y="48" width="720" height="738" rx="16" fill="#FEFBF5"/>

  <!-- Header -->
  <text x="597" y="90" text-anchor="middle" font-size="18" font-weight="700" fill="#4A3228" font-family="'Fraunces', 'Georgia', serif">Log a Bake</text>
  <text x="257" y="90" font-size="14" fill="#8B7355">Cancel</text>
  <rect x="877" y="72" width="60" height="30" rx="6" fill="#C07A2E"/>
  <text x="907" y="91" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">Save</text>
  <line x1="237" y1="106" x2="957" y2="106" stroke="#E5DDD0"/>

  <!-- PHOTOS section -->
  <text x="257" y="132" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">PHOTOS</text>

  <!-- Photo thumbnails -->
  <rect x="257" y="144" width="80" height="80" rx="8" fill="#F2EBE0" stroke="#E5DDD0"/>
  <line x1="257" y1="144" x2="337" y2="224" stroke="#E5DDD0" stroke-width="0.5"/>
  <line x1="337" y1="144" x2="257" y2="224" stroke="#E5DDD0" stroke-width="0.5"/>

  <rect x="349" y="144" width="80" height="80" rx="8" fill="#F2EBE0" stroke="#E5DDD0"/>
  <line x1="349" y1="144" x2="429" y2="224" stroke="#E5DDD0" stroke-width="0.5"/>
  <line x1="429" y1="144" x2="349" y2="224" stroke="#E5DDD0" stroke-width="0.5"/>

  <!-- Add Photo button -->
  <rect x="441" y="144" width="80" height="80" rx="8" fill="#F2EBE0" stroke="#D9CEBD" stroke-dasharray="4 3"/>
  <text x="481" y="180" text-anchor="middle" font-size="20" fill="#D9CEBD">+</text>
  <text x="481" y="198" text-anchor="middle" font-size="10" fill="#8B7355">Add Photo</text>

  <line x1="257" y1="242" x2="937" y2="242" stroke="#E5DDD0"/>

  <!-- FORMULA section -->
  <text x="257" y="268" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">FORMULA</text>

  <!-- Formula dropdown -->
  <text x="257" y="298" font-size="13" fill="#8B7355">Formula</text>
  <rect x="380" y="280" width="220" height="36" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="392" y="303" font-size="14" fill="#4A3228">No-Knead PAL</text>
  <text x="592" y="305" text-anchor="end" font-size="12" fill="#8B7355">&#9660;</text>

  <!-- Weight -->
  <text x="257" y="346" font-size="13" fill="#8B7355">Weight</text>
  <rect x="380" y="328" width="120" height="36" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="420" y="351" text-anchor="middle" font-size="15" font-weight="600" fill="#4A3228">900</text>
  <text x="510" y="351" font-size="14" fill="#8B7355">g</text>

  <line x1="257" y1="382" x2="937" y2="382" stroke="#E5DDD0"/>

  <!-- RATING section -->
  <text x="257" y="408" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">RATING</text>

  <!-- Overall (required) -->
  <text x="257" y="438" font-size="14" fill="#4A3228">Overall</text>
  <text x="400" y="438" font-size="22" fill="#E5DDD0">&#9733;&#9733;&#9733;&#9733;&#9733;</text>
  <text x="257" y="454" font-size="10" fill="#A04030">required</text>

  <!-- Crumb (optional) -->
  <text x="257" y="480" font-size="13" fill="#8B7355">Crumb</text>
  <text x="400" y="480" font-size="22" fill="#E5DDD0">&#9733;&#9733;&#9733;&#9733;&#9733;</text>
  <text x="570" y="480" font-size="11" fill="#D9CEBD">optional</text>

  <!-- Crust (optional) -->
  <text x="257" y="510" font-size="13" fill="#8B7355">Crust</text>
  <text x="400" y="510" font-size="22" fill="#E5DDD0">&#9733;&#9733;&#9733;&#9733;&#9733;</text>
  <text x="570" y="510" font-size="11" fill="#D9CEBD">optional</text>

  <!-- Flavor (optional) -->
  <text x="257" y="540" font-size="13" fill="#8B7355">Flavor</text>
  <text x="400" y="540" font-size="22" fill="#E5DDD0">&#9733;&#9733;&#9733;&#9733;&#9733;</text>
  <text x="570" y="540" font-size="11" fill="#D9CEBD">optional</text>

  <line x1="257" y1="558" x2="937" y2="558" stroke="#E5DDD0"/>

  <!-- BAKE DETAILS section -->
  <text x="257" y="584" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">BAKE DETAILS</text>

  <text x="257" y="614" font-size="13" fill="#8B7355">Oven temp</text>
  <rect x="380" y="596" width="90" height="36" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="415" y="619" text-anchor="middle" font-size="15" font-weight="600" fill="#4A3228">475</text>
  <text x="478" y="619" font-size="14" fill="#8B7355">°F</text>

  <text x="530" y="614" font-size="13" fill="#8B7355">Bake time</text>
  <rect x="650" y="596" width="80" height="36" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="680" y="619" text-anchor="middle" font-size="15" font-weight="600" fill="#4A3228">45</text>
  <text x="738" y="619" font-size="14" fill="#8B7355">min</text>

  <line x1="257" y1="650" x2="937" y2="650" stroke="#E5DDD0"/>

  <!-- NOTES section -->
  <text x="257" y="676" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">NOTES</text>
  <rect x="257" y="688" width="680" height="72" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="273" y="716" font-size="13" fill="#B8A898">How did it go? Any observations about the crumb, crust, flavor...</text>

</svg>
