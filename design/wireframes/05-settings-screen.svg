  <!-- Menu item 5: About Fournil -->
  <rect x="0" y="280" width="320" height="56" fill="#F2EBE0"/>
  <text x="24" y="314" font-size="15" fill="#8B7355">About Fournil</text>
  <text x="296" y="314" text-anchor="end" font-size="14" fill="#D9CEBD">&#9654;</text>

  <!-- ==================== RIGHT DETAIL PANE — Inspiration ==================== -->

  <!-- Sources section -->
  <text x="356" y="92" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">SOURCES</text>

  <!-- Source card 1: Janjigian -->
  <rect x="356" y="108" width="500" height="72" rx="8" fill="#FFFFFF" stroke="#E5DDD0"/>
  <text x="376" y="132" font-size="15" font-weight="600" fill="#4A3228">Andrew Janjigian</text>
  <text x="376" y="152" font-size="13" fill="#8B7355">The Sourdough Lifestyle</text>
  <text x="376" y="170" font-size="12" fill="#C07A2E">wordloaf.substack.com · @wordloaf</text>

  <!-- Source card 2: Robertson -->
  <rect x="356" y="192" width="500" height="72" rx="8" fill="#FFFFFF" stroke="#E5DDD0"/>
  <text x="376" y="216" font-size="15" font-weight="600" fill="#4A3228">Chad Robertson</text>
  <text x="376" y="236" font-size="13" fill="#8B7355">Tartine Bread</text>
  <text x="376" y="254" font-size="12" fill="#C07A2E">tartinebakery.com</text>

