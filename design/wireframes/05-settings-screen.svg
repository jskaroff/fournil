  <text x="356" y="300" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">FURTHER READING</text>

  <text x="372" y="324" font-size="13" fill="#C07A2E">On desired dough temperatures (DDT)</text>
  <text x="356" y="324" font-size="13" fill="#8B7355">•</text>
  <line x1="356" y1="336" x2="856" y2="336" stroke="#F2EBE0"/>

  <text x="372" y="356" font-size="13" fill="#C07A2E">Care and feeding of a sourdough starter</text>
  <text x="356" y="356" font-size="13" fill="#8B7355">•</text>
  <line x1="356" y1="368" x2="856" y2="368" stroke="#F2EBE0"/>

  <text x="372" y="388" font-size="13" fill="#C07A2E">That Levain Feeling</text>
  <text x="356" y="388" font-size="13" fill="#8B7355">•</text>
  <line x1="356" y1="400" x2="856" y2="400" stroke="#F2EBE0"/>

  <text x="372" y="420" font-size="13" fill="#C07A2E">On Dutch oven baking</text>
  <text x="356" y="420" font-size="13" fill="#8B7355">•</text>
  <line x1="356" y1="432" x2="856" y2="432" stroke="#F2EBE0"/>

  <text x="372" y="452" font-size="13" fill="#C07A2E">No-knead PAL recipe template</text>
  <text x="356" y="452" font-size="13" fill="#8B7355">•</text>
  <line x1="356" y1="464" x2="856" y2="464" stroke="#F2EBE0"/>

  <text x="372" y="484" font-size="13" fill="#C07A2E">Quarantinystarter 2.0</text>
  <text x="356" y="484" font-size="13" fill="#8B7355">•</text>

  <!-- Glossary section -->
  <text x="356" y="528" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">SOURDOUGH GLOSSARY</text>

  <!-- Glossary item 1: collapsed -->
  <rect x="356" y="544" width="500" height="40" rx="6" fill="#F2EBE0" stroke="#E5DDD0"/>
  <text x="376" y="570" font-size="14" fill="#D9CEBD">&#9654;</text>
  <text x="396" y="570" font-size="14" fill="#4A3228">Autolyse</text>

  <!-- Glossary item 2: expanded -->
  <rect x="356" y="592" width="500" height="88" rx="6" fill="#F2EBE0" stroke="#E5DDD0"/>
  <text x="376" y="618" font-size="14" fill="#C07A2E">&#9660;</text>
  <text x="396" y="618" font-size="14" font-weight="600" fill="#4A3228">Bulk Proof</text>
  <text x="396" y="642" font-size="13" fill="#8B7355">The stage of dough fermentation before</text>
  <text x="396" y="660" font-size="13" fill="#8B7355">dividing and shaping of the loaves.</text>

  <!-- Glossary item 3: collapsed -->
  <rect x="356" y="688" width="500" height="40" rx="6" fill="#F2EBE0" stroke="#E5DDD0"/>
  <text x="376" y="714" font-size="14" fill="#D9CEBD">&#9654;</text>
  <text x="396" y="714" font-size="14" fill="#4A3228">Cold-Proofing</text>

  <!-- Glossary item 4: collapsed -->
  <rect x="356" y="736" width="500" height="40" rx="6" fill="#F2EBE0" stroke="#E5DDD0"/>
  <text x="376" y="762" font-size="14" fill="#D9CEBD">&#9654;</text>
  <text x="396" y="762" font-size="14" fill="#4A3228">DDT (Desired Dough Temperature)</text>

  <!-- Glossary item 5: collapsed -->
  <rect x="356" y="784" width="500" height="40" rx="6" fill="#F2EBE0" stroke="#E5DDD0"/>
  <text x="376" y="810" font-size="14" fill="#D9CEBD">&#9654;</text>
  <text x="396" y="810" font-size="14" fill="#4A3228">Final Formula</text>

