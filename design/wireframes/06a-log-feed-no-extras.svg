<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1194 834"
     font-family="'Source Serif 4', 'Georgia', serif" font-size="14">

  <!-- Dimmed background -->
  <rect width="1194" height="834" fill="#FEFBF5"/>
  <rect width="1194" height="834" fill="#2A1A10" opacity="0.45"/>

  <!-- ==================== MODAL ==================== -->
  <rect x="337" y="37" width="520" height="737" rx="16" fill="#FEFBF5"
        stroke="#E5DDD0" stroke-width="0.5"/>
  <rect x="572" y="46" width="50" height="4" rx="2" fill="#D9CEBD"/>

  <!-- State label (wireframe annotation) -->
  <text x="597" y="24" text-anchor="middle" font-size="11" fill="#B8A898"
        font-style="italic">State: No extras added</text>

  <!-- ==================== HEADER ==================== -->
  <text x="597" y="80" text-anchor="middle" font-size="18" font-weight="700"
        fill="#4A3228" font-family="'Fraunces', 'Georgia', serif">Log a Feed</text>
  <text x="597" y="96" text-anchor="middle" font-size="12" fill="#8B7355">Rye Baby</text>
  <line x1="357" y1="108" x2="837" y2="108" stroke="#E5DDD0"/>

  <!-- ==================== PRESETS ==================== -->
  <text x="357" y="128" font-size="10" font-weight="600" fill="#8B7355"
        letter-spacing="1">PRESET</text>
  <rect x="357" y="138" width="148" height="40" rx="8" fill="#FDF6EC"
        stroke="#C07A2E" stroke-width="2"/>
  <text x="431" y="155" text-anchor="middle" font-size="13" font-weight="600"
        fill="#4A3228">Standard</text>
  <text x="431" y="170" text-anchor="middle" font-size="11" fill="#C07A2E">2 : 2 : 1</text>
  <rect x="515" y="138" width="148" height="40" rx="8" fill="#F2EBE0" stroke="#D9CEBD"/>
  <text x="589" y="155" text-anchor="middle" font-size="13" fill="#4A3228">Overnight</text>
  <text x="589" y="170" text-anchor="middle" font-size="11" fill="#8B7355">20 : 20 : 1</text>
  <rect x="673" y="138" width="148" height="40" rx="8" fill="#F2EBE0" stroke="#D9CEBD"/>
  <text x="747" y="155" text-anchor="middle" font-size="13" fill="#4A3228">Revival</text>
  <text x="747" y="170" text-anchor="middle" font-size="11" fill="#8B7355">Protocol</text>

  <!-- ==================== FLOUR(S) ==================== -->
  <text x="357" y="202" font-size="10" font-weight="600" fill="#8B7355"
        letter-spacing="1">FLOUR(S)</text>
  <rect x="357" y="212" width="260" height="36" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="373" y="234" font-size="13" fill="#4A3228">AP Flour</text>
  <text x="601" y="234" text-anchor="end" font-size="11" fill="#8B7355">&#9660;</text>
  <rect x="627" y="212" width="100" height="36" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="677" y="234" text-anchor="middle" font-size="14" font-weight="600"
        fill="#4A3228">125</text>
  <text x="737" y="234" font-size="12" fill="#8B7355">g</text>
  <rect x="357" y="256" width="260" height="36" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="373" y="278" font-size="13" fill="#4A3228">Rye</text>
  <text x="601" y="278" text-anchor="end" font-size="11" fill="#8B7355">&#9660;</text>
  <rect x="627" y="256" width="100" height="36" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="677" y="278" text-anchor="middle" font-size="14" font-weight="600"
        fill="#4A3228">25</text>
  <text x="737" y="278" font-size="12" fill="#8B7355">g</text>
  <text x="753" y="280" font-size="14" fill="#D9CEBD">&#10005;</text>
  <text x="357" y="310" font-size="13" fill="#C07A2E">+ Add Flour</text>

  <!-- ==================== WATER ==================== -->
  <text x="357" y="338" font-size="10" font-weight="600" fill="#8B7355"
        letter-spacing="1">WATER</text>
  <rect x="357" y="348" width="100" height="36" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="407" y="370" text-anchor="middle" font-size="14" font-weight="600"
        fill="#4A3228">150</text>
  <text x="467" y="370" font-size="12" fill="#8B7355">g</text>
  <circle cx="510" cy="366" r="7" fill="none" stroke="#C07A2E" stroke-width="1.5"/>
  <circle cx="510" cy="366" r="3.5" fill="#C07A2E"/>
  <text x="524" y="370" font-size="13" fill="#4A3228">Tap</text>
  <circle cx="576" cy="366" r="7" fill="none" stroke="#D9CEBD" stroke-width="1.5"/>
  <text x="590" y="370" font-size="13" fill="#8B7355">Filtered</text>
  <text x="665" y="370" font-size="12" fill="#8B7355">Temp:</text>
  <rect x="710" y="350" width="72" height="32" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="746" y="370" text-anchor="middle" font-size="14" font-weight="600"
        fill="#4A3228">80</text>
  <text x="790" y="370" font-size="12" fill="#8B7355">°F</text>
  <line x1="357" y1="396" x2="837" y2="396" stroke="#E5DDD0"/>

  <!-- ==================== PREVIOUS FEED (expanded) ==================== -->
  <text x="357" y="418" font-size="10" font-weight="600" fill="#8B7355"
        letter-spacing="1">PREVIOUS FEED</text>
  <text x="462" y="418" font-size="11" fill="#8B7355">&#9660;</text>

  <line x1="369" y1="436" x2="369" y2="472" stroke="#C07A2E" stroke-width="1.5"
        stroke-dasharray="3 3"/>
  <circle cx="369" cy="440" r="6" fill="none" stroke="#C07A2E" stroke-width="1.5"/>
  <circle cx="369" cy="440" r="3" fill="#C07A2E"/>
  <text x="384" y="444" font-size="13" fill="#4A3228">Chained to last feed</text>
  <text x="530" y="444" font-size="11" fill="#8B7355">(Mar 17, 7:00 AM)</text>
  <circle cx="369" cy="466" r="6" fill="none" stroke="#D9CEBD" stroke-width="1.5"/>
  <text x="384" y="470" font-size="13" fill="#8B7355">Missed a feed (break chain)</text>

  <text x="384" y="494" font-size="11" fill="#B8A898">How did the previous cycle go?</text>
  <rect x="384" y="502" width="436" height="48" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="400" y="530" font-size="12" fill="#4A3228">Doubled nicely in ~5h, good aroma…</text>
  <line x1="357" y1="566" x2="837" y2="566" stroke="#E5DDD0"/>

  <!-- ==================== ADD DETAILS — all inactive ==================== -->
  <text x="357" y="586" font-size="10" font-weight="600" fill="#8B7355"
        letter-spacing="1">ADD DETAILS</text>

  <!-- Tray -->
  <rect x="357" y="596" width="480" height="42" rx="21" fill="#F0E9DE"/>

  <!-- Pill: Discard (inactive) -->
  <rect x="361" y="600" width="112" height="34" rx="17" fill="#FEFBF5"/>
  <text x="417" y="622" text-anchor="middle" font-size="12" fill="#8B7355">Discard</text>

  <!-- Pill: Photos (inactive) -->
  <rect x="481" y="600" width="112" height="34" rx="17" fill="#FEFBF5"/>
  <text x="537" y="622" text-anchor="middle" font-size="12" fill="#8B7355">Photos</text>

  <!-- Pill: Temps (inactive) -->
  <rect x="601" y="600" width="112" height="34" rx="17" fill="#FEFBF5"/>
  <text x="657" y="622" text-anchor="middle" font-size="12" fill="#8B7355">Temps</text>

  <!-- Pill: Notes (inactive) -->
  <rect x="721" y="600" width="112" height="34" rx="17" fill="#FEFBF5"/>
  <text x="777" y="622" text-anchor="middle" font-size="12" fill="#8B7355">Notes</text>

  <!-- No expanded content -->

  <!-- ==================== WHEN ==================== -->
  <line x1="357" y1="652" x2="837" y2="652" stroke="#E5DDD0"/>
  <text x="357" y="672" font-size="10" font-weight="600" fill="#8B7355"
        letter-spacing="1">WHEN</text>
  <circle cx="369" cy="690" r="6" fill="none" stroke="#C07A2E" stroke-width="1.5"/>
  <circle cx="369" cy="690" r="3" fill="#C07A2E"/>
  <text x="384" y="694" font-size="13" fill="#4A3228">Now</text>
  <text x="420" y="694" font-size="11" fill="#8B7355">(Mar 18, 8:30 AM)</text>
  <circle cx="570" cy="690" r="6" fill="none" stroke="#D9CEBD" stroke-width="1.5"/>
  <text x="585" y="694" font-size="13" fill="#8B7355">Earlier…</text>

  <!-- ==================== FOOTER ==================== -->
  <line x1="357" y1="714" x2="837" y2="714" stroke="#E5DDD0"/>
  <text x="370" y="742" font-size="14" fill="#8B7355">Cancel</text>
  <rect x="717" y="726" width="120" height="40" rx="10" fill="#C07A2E"/>
  <text x="777" y="750" text-anchor="middle" font-size="16" font-weight="700"
        fill="#FFFFFF">Save Feed</text>

</svg>
