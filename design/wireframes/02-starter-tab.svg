<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1194 834"
     font-family="'Source Serif 4', 'Georgia', serif" font-size="14">

  <!-- Background -->
  <rect width="1194" height="834" fill="#FEFBF5"/>

  <!-- ==================== TOP NAV BAR ==================== -->
  <rect x="0" y="0" width="1194" height="56" fill="#FEFBF5"/>
  <line x1="0" y1="56" x2="1194" y2="56" stroke="#E5DDD0"/>
  <text x="32" y="37" font-size="22" font-weight="700" fill="#4A3228"
        font-family="'Fraunces', 'Georgia', serif">Starters</text>
  <text x="32" y="52" font-size="11" fill="#8B7355">3 starters</text>

  <!-- + New Starter button -->
  <rect x="1020" y="14" width="140" height="34" rx="8" fill="#C07A2E"/>
  <text x="1090" y="36" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">+ New Starter</text>

  <!-- Gear icon -->
  <g transform="translate(980, 18)" stroke="#8B7355">
    <circle cx="10" cy="10" r="9" fill="none" stroke-width="1.5"/>
    <circle cx="10" cy="10" r="3" fill="none" stroke-width="1.5"/>
    <line x1="10" y1="0" x2="10" y2="3" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="17" x2="10" y2="20" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="10" x2="3" y2="10" stroke-width="2" stroke-linecap="round"/>
    <line x1="17" y1="10" x2="20" y2="10" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="3" x2="5.5" y2="5.5" stroke-width="2" stroke-linecap="round"/>
    <line x1="14.5" y1="14.5" x2="17" y2="17" stroke-width="2" stroke-linecap="round"/>
    <line x1="17" y1="3" x2="14.5" y2="5.5" stroke-width="2" stroke-linecap="round"/>
    <line x1="5.5" y1="14.5" x2="3" y2="17" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ==================== STARTER CARDS ==================== -->

  <!-- Card 1: Rye Baby (Thriving) -->
  <rect x="32" y="80" width="370" height="280" rx="12" fill="#F2EBE0" stroke="#E5DDD0"/>

  <!-- Health dot + Name -->
  <circle cx="56" cy="108" r="6" fill="#5E8A50"/>
  <text x="72" y="114" font-size="20" font-weight="700" fill="#4A3228"
        font-family="'Fraunces', 'Georgia', serif">Rye Baby</text>

  <!-- Feeding info -->
  <text x="56" y="142" font-size="13" fill="#5E8A50">Fed 6 hours ago</text>
  <text x="56" y="164" font-size="13" fill="#8B7355">AP 125g + Rye 25g · 150g water</text>
  <text x="56" y="186" font-size="13" fill="#8B7355">Peaked at 4.5h</text>

  <!-- Photo placeholder -->
  <rect x="56" y="206" width="322" height="130" rx="8" fill="#E5DDD0"/>
  <line x1="56" y1="206" x2="378" y2="336" stroke="#D9CEBD" stroke-width="0.5"/>
  <line x1="378" y1="206" x2="56" y2="336" stroke="#D9CEBD" stroke-width="0.5"/>
  <text x="217" y="274" text-anchor="middle" font-size="12" fill="#B8A898">Last feed photo</text>

  <!-- Card 2: Old Faithful (Needs Feeding) -->
  <rect x="418" y="80" width="370" height="280" rx="12" fill="#F2EBE0" stroke="#E5DDD0"/>

  <circle cx="442" cy="108" r="6" fill="#C9962E"/>
  <text x="458" y="114" font-size="20" font-weight="700" fill="#4A3228"
        font-family="'Fraunces', 'Georgia', serif">Old Faithful</text>

  <text x="442" y="142" font-size="13" fill="#C9962E">Fed 3 days ago</text>
  <text x="442" y="164" font-size="13" fill="#8B7355">Bread flour 150g · 150g water</text>
  <text x="442" y="186" font-size="13" fill="#8B7355">Last peak: 5.2h</text>

  <rect x="442" y="206" width="322" height="130" rx="8" fill="#E5DDD0"/>
  <line x1="442" y1="206" x2="764" y2="336" stroke="#D9CEBD" stroke-width="0.5"/>
  <line x1="764" y1="206" x2="442" y2="336" stroke="#D9CEBD" stroke-width="0.5"/>
  <text x="603" y="274" text-anchor="middle" font-size="12" fill="#B8A898">Last feed photo</text>

  <!-- Card 3: Pumpernickel (Thriving) -->
  <rect x="804" y="80" width="370" height="280" rx="12" fill="#F2EBE0" stroke="#E5DDD0"/>

  <circle cx="828" cy="108" r="6" fill="#5E8A50"/>
  <text x="844" y="114" font-size="20" font-weight="700" fill="#4A3228"
        font-family="'Fraunces', 'Georgia', serif">Pumpernickel</text>

  <text x="828" y="142" font-size="13" fill="#5E8A50">Fed 10 hours ago</text>
  <text x="828" y="164" font-size="13" fill="#8B7355">Dark rye 100g · 100g water</text>
  <text x="828" y="186" font-size="13" fill="#8B7355">Peaked at 6h</text>

  <rect x="828" y="206" width="322" height="130" rx="8" fill="#E5DDD0"/>
  <line x1="828" y1="206" x2="1150" y2="336" stroke="#D9CEBD" stroke-width="0.5"/>
  <line x1="1150" y1="206" x2="828" y2="336" stroke="#D9CEBD" stroke-width="0.5"/>
  <text x="989" y="274" text-anchor="middle" font-size="12" fill="#B8A898">Last feed photo</text>

  <!-- ==================== BOTTOM TAB BAR ==================== -->
  <rect x="0" y="774" width="1194" height="60" fill="#F2EBE0"/>
  <line x1="0" y1="774" x2="1194" y2="774" stroke="#E5DDD0"/>

  <!-- Plan tab (inactive) -->
  <g transform="translate(159, 783)">
    <rect x="0" y="0" width="14" height="18" rx="2" fill="none" stroke="#8B7355" stroke-width="1.5"/>
    <rect x="4" y="-2" width="6" height="4" rx="1" fill="none" stroke="#8B7355" stroke-width="1.5"/>
    <line x1="4" y1="7" x2="10" y2="7" stroke="#8B7355" stroke-width="1"/>
    <line x1="4" y1="11" x2="10" y2="11" stroke="#8B7355" stroke-width="1"/>
    <line x1="4" y1="15" x2="8" y2="15" stroke="#8B7355" stroke-width="1"/>
    <text x="7" y="34" text-anchor="middle" font-size="11" fill="#8B7355">Bake</text>
  </g>

  <!-- Starter tab (active) -->
  <g transform="translate(556, 783)">
    <path d="M3,0 L11,0 L11,6 L15,18 L-1,18 L3,6 Z" fill="none" stroke="#C07A2E" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="3" y1="0" x2="11" y2="0" stroke="#C07A2E" stroke-width="2" stroke-linecap="round"/>
    <text x="7" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#C07A2E">Starter</text>
  </g>

  <!-- Log tab (inactive) -->
  <g transform="translate(953, 783)">
    <rect x="0" y="0" width="14" height="18" rx="2" fill="none" stroke="#8B7355" stroke-width="1.5"/>
    <line x1="7" y1="0" x2="7" y2="18" stroke="#8B7355" stroke-width="1"/>
    <line x1="3" y1="5" x2="6" y2="5" stroke="#8B7355" stroke-width="0.8"/>
    <line x1="3" y1="8" x2="6" y2="8" stroke="#8B7355" stroke-width="0.8"/>
    <text x="7" y="34" text-anchor="middle" font-size="11" fill="#8B7355">Log</text>
  </g>

</svg>