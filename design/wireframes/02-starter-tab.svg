<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1194 834"
     font-family="'Source Serif 4', 'Georgia', serif" font-size="14">
  <defs>
    <!-- Health ring gradient -->
    <linearGradient id="healthGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5E8A50;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#5E8A50;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1194" height="834" fill="#FEFBF5"/>

  <!-- ==================== TOP NAV BAR ==================== -->
  <rect x="0" y="0" width="1194" height="56" fill="#FEFBF5"/>
  <line x1="0" y1="56" x2="1194" y2="56" stroke="#E5DDD0"/>
  <text x="32" y="37" font-size="22" font-weight="700" fill="#4A3228" font-family="'Fraunces', 'Georgia', serif">Starter</text>

  <!-- Feed button (top-right) -->
  <rect x="1044" y="14" width="118" height="36" rx="8" fill="#C07A2E"/>
  <text x="1103" y="37" text-anchor="middle" font-size="14" font-weight="600" fill="#FFFFFF">Feed</text>

  <!-- Gear icon -->
  <g transform="translate(1008, 18)" stroke="#8B7355">
    <circle cx="10" cy="10" r="9" fill="none" stroke-width="1.5"/>
    <circle cx="10" cy="10" r="3" fill="none" stroke-width="1.5"/>
    <line x1="10" y1="0" x2="10" y2="3" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="17" x2="10" y2="20" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="10" x2="3" y2="10" stroke-width="2" stroke-linecap="round"/>
    <line x1="17" y1="10" x2="20" y2="10" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="3" x2="5.5" y2="5.5" stroke-width="2" stroke-linecap="round"/>
    <line x1="14.5" y1="14.5" x2="17" y2="17" stroke-width="2" stroke-linecap="round"/>
    <line x1="17" y1="3" x2="14.5" y2="5.5" stroke-width="2" stroke-linecap="round"/>
    <line x1="5.5" y1="14.5" x2="3" y2="17" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ==================== BOTTOM TAB BAR ==================== -->
  <rect x="0" y="774" width="1194" height="60" fill="#F2EBE0"/>
  <line x1="0" y1="774" x2="1194" y2="774" stroke="#E5DDD0"/>

  <!-- Plan tab (inactive) -->
  <g transform="translate(159, 783)">
    <rect x="0" y="0" width="14" height="18" rx="2" fill="none" stroke="#8B7355" stroke-width="1.5"/>
    <rect x="4" y="-2" width="6" height="4" rx="1" fill="none" stroke="#8B7355" stroke-width="1.5"/>
    <line x1="4" y1="7" x2="10" y2="7" stroke="#8B7355" stroke-width="1"/>
    <line x1="4" y1="11" x2="10" y2="11" stroke="#8B7355" stroke-width="1"/>
    <line x1="4" y1="15" x2="8" y2="15" stroke="#8B7355" stroke-width="1"/>
    <text x="7" y="34" text-anchor="middle" font-size="11" fill="#8B7355">Plan</text>
  </g>

  <!-- Starter tab (active) -->
  <g transform="translate(556, 783)">
    <path d="M3,0 L11,0 L11,6 L15,18 L-1,18 L3,6 Z" fill="none" stroke="#C07A2E" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="3" y1="0" x2="11" y2="0" stroke="#C07A2E" stroke-width="2" stroke-linecap="round"/>
    <text x="7" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#C07A2E">Starter</text>
  </g>

  <!-- Log tab (inactive) -->
  <g transform="translate(953, 783)">
    <rect x="0" y="0" width="14" height="18" rx="2" fill="none" stroke="#8B7355" stroke-width="1.5"/>
    <line x1="7" y1="0" x2="7" y2="18" stroke="#8B7355" stroke-width="1"/>
    <line x1="3" y1="5" x2="6" y2="5" stroke="#8B7355" stroke-width="0.8"/>
    <line x1="3" y1="8" x2="6" y2="8" stroke="#8B7355" stroke-width="0.8"/>
    <text x="7" y="34" text-anchor="middle" font-size="11" fill="#8B7355">Log</text>
  </g>

  <!-- ==================== VERTICAL DIVIDER ==================== -->
  <line x1="418" y1="72" x2="418" y2="758" stroke="#E5DDD0"/>

  <!-- ==================== LEFT COLUMN (35%) ==================== -->

  <!-- Health Indicator Ring -->
  <circle cx="209" cy="200" r="72" fill="url(#healthGlow)"/>
  <circle cx="209" cy="200" r="60" fill="none" stroke="#5E8A50" stroke-width="5" stroke-linecap="round"/>
  <circle cx="209" cy="200" r="48" fill="#FEFBF5"/>
  <!-- Inner icon area -->
  <circle cx="209" cy="190" r="8" fill="#5E8A50" opacity="0.8"/>
  <text x="209" y="220" text-anchor="middle" font-size="16" font-weight="700" fill="#5E8A50" font-family="'Fraunces', 'Georgia', serif">THRIVING</text>

  <!-- Last fed info -->
  <text x="209" y="296" text-anchor="middle" font-size="14" fill="#4A3228">Last fed: 8 hours ago</text>
  <text x="209" y="318" text-anchor="middle" font-size="13" fill="#8B7355">Next feeding: ~4 hours</text>

  <!-- Starter Notes -->
  <text x="32" y="370" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">STARTER NOTES</text>
  <rect x="32" y="382" width="354" height="72" rx="8" fill="#F2EBE0" stroke="#E5DDD0"/>
  <text x="48" y="406" font-size="13" fill="#4A3228">"Fed with KA bread flour,</text>
  <text x="48" y="424" font-size="13" fill="#4A3228">room at 72°F"</text>

  <!-- Quick Stats -->
  <text x="32" y="494" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">QUICK STATS</text>

  <rect x="32" y="510" width="354" height="104" rx="8" fill="#F2EBE0" stroke="#E5DDD0"/>

  <!-- Stat row 1 -->
  <text x="48" y="538" font-size="13" fill="#8B7355">Avg peak time</text>
  <text x="370" y="538" text-anchor="end" font-size="14" font-weight="600" fill="#4A3228">4.8h</text>
  <line x1="48" y1="550" x2="370" y2="550" stroke="#E5DDD0"/>

  <!-- Stat row 2 -->
  <text x="48" y="572" font-size="13" fill="#8B7355">Feedings this week</text>
  <text x="370" y="572" text-anchor="end" font-size="14" font-weight="600" fill="#4A3228">5</text>
  <line x1="48" y1="584" x2="370" y2="584" stroke="#E5DDD0"/>

  <!-- Stat row 3 -->
  <text x="48" y="604" font-size="13" fill="#8B7355">Days since revival</text>
  <text x="370" y="604" text-anchor="end" font-size="14" font-weight="600" fill="#4A3228">42</text>

  <!-- ==================== RIGHT COLUMN (65%) ==================== -->

  <text x="450" y="92" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">FEEDING HISTORY</text>

  <!-- Feeding entry 1 -->
  <rect x="450" y="108" width="712" height="108" rx="8" fill="#FFFFFF" stroke="#E5DDD0"/>
  <text x="470" y="134" font-size="15" font-weight="600" fill="#4A3228">Mar 15, 8:30 AM</text>
  <rect x="640" y="118" width="80" height="22" rx="11" fill="#F2EBE0"/>
  <text x="680" y="134" text-anchor="middle" font-size="11" font-weight="500" fill="#8B7355">2:2:1</text>
  <text x="470" y="162" font-size="13" fill="#8B7355">150g flour · 150g water · 75g starter</text>
  <text x="470" y="184" font-size="13" fill="#5E8A50">Peaked at 4.5h</text>
  <text x="470" y="204" font-size="12" fill="#8B7355" font-style="italic">"Used KA bread flour + rye"</text>

  <!-- Feeding entry 2 -->
  <rect x="450" y="228" width="712" height="96" rx="8" fill="#FFFFFF" stroke="#E5DDD0"/>
  <text x="470" y="254" font-size="15" font-weight="600" fill="#4A3228">Mar 14, 7:00 AM</text>
  <rect x="640" y="238" width="80" height="22" rx="11" fill="#F2EBE0"/>
  <text x="680" y="254" text-anchor="middle" font-size="11" font-weight="500" fill="#8B7355">2:2:1</text>
  <text x="470" y="282" font-size="13" fill="#8B7355">150g flour · 150g water · 75g starter</text>
  <text x="470" y="304" font-size="13" fill="#5E8A50">Peaked at 5h</text>

  <!-- Feeding entry 3 -->
  <rect x="450" y="336" width="712" height="96" rx="8" fill="#FFFFFF" stroke="#E5DDD0"/>
  <text x="470" y="362" font-size="15" font-weight="600" fill="#4A3228">Mar 13, 9:00 PM</text>
  <rect x="640" y="346" width="100" height="22" rx="11" fill="#F2EBE0"/>
  <text x="690" y="362" text-anchor="middle" font-size="11" font-weight="500" fill="#8B7355">20:20:1</text>
  <text x="470" y="390" font-size="13" fill="#8B7355">150g flour · 150g water · 8g starter</text>
  <text x="470" y="412" font-size="13" fill="#5E8A50">Peaked at 8h</text>

  <!-- Feeding entry 4 -->
  <rect x="450" y="444" width="712" height="96" rx="8" fill="#FFFFFF" stroke="#E5DDD0"/>
  <text x="470" y="470" font-size="15" font-weight="600" fill="#4A3228">Mar 13, 8:00 AM</text>
  <rect x="640" y="454" width="80" height="22" rx="11" fill="#F2EBE0"/>
  <text x="680" y="470" text-anchor="middle" font-size="11" font-weight="500" fill="#8B7355">2:2:1</text>
  <text x="470" y="498" font-size="13" fill="#8B7355">150g flour · 150g water · 75g starter</text>
  <text x="470" y="520" font-size="13" fill="#5E8A50">Peaked at 4.2h</text>

  <!-- Feeding entry 5 -->
  <rect x="450" y="552" width="712" height="96" rx="8" fill="#FFFFFF" stroke="#E5DDD0"/>
  <text x="470" y="578" font-size="15" font-weight="600" fill="#4A3228">Mar 12, 7:30 AM</text>
  <rect x="640" y="562" width="80" height="22" rx="11" fill="#F2EBE0"/>
  <text x="680" y="578" text-anchor="middle" font-size="11" font-weight="500" fill="#8B7355">2:2:1</text>
  <text x="470" y="606" font-size="13" fill="#8B7355">150g flour · 150g water · 75g starter</text>
  <text x="470" y="628" font-size="13" fill="#5E8A50">Peaked at 5.1h</text>

  <!-- Scroll indicator -->
  <text x="806" y="680" text-anchor="middle" font-size="12" fill="#D9CEBD">· · ·</text>

</svg>