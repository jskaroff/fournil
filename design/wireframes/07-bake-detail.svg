<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1194 834"
     font-family="'Source Serif 4', 'Georgia', serif" font-size="14">

  <!-- Background -->
  <rect width="1194" height="834" fill="#FEFBF5"/>

  <!-- ==================== TOP NAV BAR ==================== -->
  <rect x="0" y="0" width="1194" height="56" fill="#FEFBF5"/>
  <line x1="0" y1="56" x2="1194" y2="56" stroke="#E5DDD0"/>

  <!-- Back button -->
  <text x="32" y="37" font-size="16" fill="#C07A2E">&#9664;</text>
  <text x="52" y="37" font-size="14" fill="#C07A2E">Bread Log</text>

  <!-- Title -->
  <text x="597" y="37" text-anchor="middle" font-size="18" font-weight="700" fill="#4A3228"
        font-family="'Fraunces', 'Georgia', serif">March 15 Bake</text>

  <!-- Share + Edit buttons -->
  <rect x="1020" y="14" width="72" height="30" rx="6" fill="#FFFFFF" stroke="#D9CEBD" stroke-width="1"/>
  <text x="1056" y="33" text-anchor="middle" font-size="13" fill="#4A3228">Share &#8599;</text>
  <rect x="1104" y="14" width="56" height="30" rx="6" fill="#F2EBE0" stroke="#D9CEBD" stroke-width="1"/>
  <text x="1132" y="33" text-anchor="middle" font-size="13" fill="#4A3228">Edit</text>

  <!-- ==================== VERTICAL DIVIDER ==================== -->
  <line x1="597" y1="56" x2="597" y2="820" stroke="#E5DDD0"/>

  <!-- ==================== LEFT COLUMN — PHOTO CAROUSEL ==================== -->

  <!-- Main photo with nav arrows -->
  <rect x="32" y="80" width="528" height="360" rx="10" fill="#F2EBE0"/>
  <line x1="32" y1="80" x2="560" y2="440" stroke="#E5DDD0" stroke-width="0.5"/>
  <line x1="560" y1="80" x2="32" y2="440" stroke="#E5DDD0" stroke-width="0.5"/>
  <text x="296" y="268" text-anchor="middle" font-size="14" fill="#D9CEBD">Main Photo</text>

  <!-- Carousel arrows -->
  <rect x="48" y="236" width="36" height="36" rx="18" fill="#FFFFFF" opacity="0.8"/>
  <text x="66" y="260" text-anchor="middle" font-size="18" fill="#4A3228">&#9664;</text>
  <rect x="508" y="236" width="36" height="36" rx="18" fill="#FFFFFF" opacity="0.8"/>
  <text x="526" y="260" text-anchor="middle" font-size="18" fill="#4A3228">&#9654;</text>

  <!-- Dot indicators -->
  <circle cx="272" cy="460" r="4" fill="#C07A2E"/>
  <circle cx="290" cy="460" r="4" fill="#E5DDD0"/>
  <circle cx="308" cy="460" r="4" fill="#E5DDD0"/>

  <!-- Thumbnail strip -->
  <rect x="32" y="476" width="120" height="88" rx="6" fill="#F2EBE0" stroke="#C07A2E" stroke-width="1.5"/>
  <text x="92" y="524" text-anchor="middle" font-size="10" fill="#D9CEBD">Thumb 1</text>

  <rect x="164" y="476" width="120" height="88" rx="6" fill="#F2EBE0"/>
  <text x="224" y="524" text-anchor="middle" font-size="10" fill="#D9CEBD">Thumb 2</text>

  <rect x="296" y="476" width="120" height="88" rx="6" fill="#F2EBE0"/>
  <text x="356" y="524" text-anchor="middle" font-size="10" fill="#D9CEBD">Thumb 3</text>

  <!-- + Add Photo -->
  <rect x="428" y="476" width="120" height="88" rx="6" fill="#FEFBF5" stroke="#D9CEBD" stroke-dasharray="4 3"/>
  <text x="488" y="516" text-anchor="middle" font-size="20" fill="#D9CEBD">+</text>
  <text x="488" y="540" text-anchor="middle" font-size="11" fill="#B8A898">Add Photo</text>

  <!-- ==================== RIGHT COLUMN — DETAILS ==================== -->

  <!-- Title and date -->
  <text x="629" y="104" font-size="20" font-weight="700" fill="#4A3228"
        font-family="'Fraunces', 'Georgia', serif">No-Knead Pain au Levain</text>
  <text x="629" y="126" font-size="13" fill="#8B7355">March 15, 2026</text>
  <text x="629" y="146" font-size="13" fill="#8B7355">Starter: Rye Baby</text>

  <line x1="629" y1="162" x2="1152" y2="162" stroke="#E5DDD0"/>

  <!-- RATING section -->
  <text x="629" y="186" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">RATING</text>

  <text x="629" y="212" font-size="13" fill="#8B7355">Overall</text>
  <text x="780" y="212" font-size="17" fill="#C07A2E">&#9733;&#9733;&#9733;&#9733;</text>
  <text x="848" y="212" font-size="17" fill="#E5DDD0">&#9733;</text>

  <text x="629" y="236" font-size="13" fill="#8B7355">Crumb</text>
  <text x="780" y="236" font-size="17" fill="#C07A2E">&#9733;&#9733;&#9733;&#9733;&#9733;</text>

  <text x="629" y="260" font-size="13" fill="#8B7355">Crust</text>
  <text x="780" y="260" font-size="17" fill="#C07A2E">&#9733;&#9733;&#9733;</text>
  <text x="832" y="260" font-size="17" fill="#E5DDD0">&#9733;&#9733;</text>

  <text x="629" y="284" font-size="13" fill="#8B7355">Flavor</text>
  <text x="780" y="284" font-size="17" fill="#C07A2E">&#9733;&#9733;&#9733;&#9733;</text>
  <text x="848" y="284" font-size="17" fill="#E5DDD0">&#9733;</text>

  <text x="629" y="308" font-size="13" fill="#8B7355">Rise</text>
  <text x="780" y="308" font-size="17" fill="#C07A2E">&#9733;&#9733;&#9733;&#9733;</text>
  <text x="848" y="308" font-size="17" fill="#E5DDD0">&#9733;</text>

  <line x1="629" y1="324" x2="1152" y2="324" stroke="#E5DDD0"/>

  <!-- FORMULA section -->
  <text x="629" y="348" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">FORMULA</text>
  <text x="629" y="372" font-size="14" fill="#4A3228">95% AP · 5% rye</text>
  <text x="629" y="392" font-size="14" fill="#4A3228">74% hydration · 5% levain</text>
  <text x="629" y="412" font-size="13" fill="#8B7355">Target dough: 900g</text>

  <line x1="629" y1="430" x2="1152" y2="430" stroke="#E5DDD0"/>

  <!-- NOTES section -->
  <text x="629" y="454" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">NOTES</text>
  <text x="629" y="478" font-size="14" fill="#4A3228">"Best crumb yet! The long cold proof</text>
  <text x="629" y="498" font-size="14" fill="#4A3228">really helped with the open crumb."</text>

  <line x1="629" y1="518" x2="1152" y2="518" stroke="#E5DDD0"/>

  <!-- BAKE DETAILS section -->
  <text x="629" y="542" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">BAKE DETAILS</text>

  <text x="629" y="566" font-size="13" fill="#8B7355">Oven temp</text>
  <text x="900" y="566" text-anchor="end" font-size="14" font-weight="600" fill="#4A3228">475°F &#8594; 425°F</text>
  <line x1="629" y1="578" x2="900" y2="578" stroke="#F2EBE0"/>

  <text x="629" y="598" font-size="13" fill="#8B7355">Covered</text>
  <text x="900" y="598" text-anchor="end" font-size="14" font-weight="600" fill="#4A3228">20 min</text>
  <line x1="629" y1="610" x2="900" y2="610" stroke="#F2EBE0"/>

  <text x="629" y="630" font-size="13" fill="#8B7355">Uncovered</text>
  <text x="900" y="630" text-anchor="end" font-size="14" font-weight="600" fill="#4A3228">25 min</text>

  <line x1="629" y1="654" x2="1152" y2="654" stroke="#E5DDD0"/>

  <!-- ==================== ACTION BUTTONS ==================== -->

  <!-- Bake this Again -->
  <rect x="629" y="674" width="240" height="44" rx="8" fill="#FFFFFF" stroke="#C07A2E" stroke-width="1.5"/>
  <text x="749" y="701" text-anchor="middle" font-size="14" font-weight="600" fill="#C07A2E">&#x1F504; Bake this Again</text>

  <!-- Share Your Bread -->
  <rect x="885" y="674" width="240" height="44" rx="8" fill="#F2EBE0" stroke="#E5DDD0"/>
  <text x="1005" y="701" text-anchor="middle" font-size="14" font-weight="600" fill="#8B7355">&#x1F35E; Share Your Bread</text>

</svg>