<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1194 834"
     font-family="'Source Serif 4', 'Georgia', serif" font-size="14">

  <!-- Background -->
  <rect width="1194" height="834" fill="#FEFBF5"/>

  <!-- ==================== TOP NAV BAR ==================== -->
  <rect x="0" y="0" width="1194" height="56" fill="#FEFBF5"/>
  <line x1="0" y1="56" x2="1194" y2="56" stroke="#E5DDD0"/>
  <text x="32" y="37" font-size="14" fill="#C07A2E">&#9664; Starters</text>
  <text x="200" y="37" font-size="18" font-weight="700" fill="#4A3228"
        font-family="'Fraunces', 'Georgia', serif">Rye Baby</text>

  <!-- Log a Feed button -->
  <rect x="1020" y="14" width="140" height="34" rx="8" fill="#C07A2E"/>
  <text x="1090" y="36" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">Log a Feed</text>

  <!-- ==================== VERTICAL DIVIDER ==================== -->
  <line x1="478" y1="72" x2="478" y2="758" stroke="#E5DDD0"/>

  <!-- ==================== LEFT COLUMN (40%) ==================== -->

  <!-- Last feed photo -->
  <rect x="32" y="80" width="414" height="240" rx="10" fill="#F2EBE0"/>
  <line x1="32" y1="80" x2="446" y2="320" stroke="#E5DDD0" stroke-width="0.5"/>
  <line x1="446" y1="80" x2="32" y2="320" stroke="#E5DDD0" stroke-width="0.5"/>
  <text x="239" y="206" text-anchor="middle" font-size="13" fill="#D9CEBD">Last feed photo</text>

  <!-- Health status -->
  <circle cx="56" cy="356" r="8" fill="#5E8A50"/>
  <text x="74" y="362" font-size="18" font-weight="700" fill="#5E8A50"
        font-family="'Fraunces', 'Georgia', serif">THRIVING</text>
  <text x="56" y="386" font-size="14" fill="#4A3228">Fed 6 hours ago</text>

  <line x1="32" y1="406" x2="446" y2="406" stroke="#E5DDD0"/>

  <!-- About section -->
  <text x="32" y="434" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">ABOUT</text>
  <text x="32" y="458" font-size="13" fill="#8B7355">Source:</text>
  <text x="82" y="458" font-size="13" fill="#4A3228">Friend (Sarah, 2024)</text>
  <text x="32" y="482" font-size="13" fill="#4A3228" font-style="italic">"My original rye starter, maintained since</text>
  <text x="32" y="500" font-size="13" fill="#4A3228" font-style="italic">2024. Robust and reliable."</text>

  <line x1="32" y1="520" x2="446" y2="520" stroke="#E5DDD0"/>

  <!-- Bakes with this starter -->
  <text x="32" y="548" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">BAKES WITH THIS STARTER</text>

  <rect x="32" y="564" width="414" height="40" rx="6" fill="#FFFFFF" stroke="#E5DDD0"/>
  <text x="48" y="590" font-size="13" fill="#4A3228">Mar 15 · No-Knead PAL</text>
  <text x="370" y="590" font-size="14" fill="#C07A2E">&#9733;&#9733;&#9733;&#9733;</text>
  <text x="420" y="590" font-size="14" fill="#E5DDD0">&#9733;</text>

  <rect x="32" y="612" width="414" height="40" rx="6" fill="#FFFFFF" stroke="#E5DDD0"/>
  <text x="48" y="638" font-size="13" fill="#4A3228">Mar 10 · Four-Fold 80/25</text>
  <text x="370" y="638" font-size="14" fill="#C07A2E">&#9733;&#9733;&#9733;&#9733;&#9733;</text>

  <rect x="32" y="660" width="414" height="40" rx="6" fill="#FFFFFF" stroke="#E5DDD0"/>
  <text x="48" y="686" font-size="13" fill="#4A3228">Mar 5 · No-Knead PAL</text>
  <text x="370" y="686" font-size="14" fill="#C07A2E">&#9733;&#9733;&#9733;</text>
  <text x="406" y="686" font-size="14" fill="#E5DDD0">&#9733;&#9733;</text>

  <!-- ==================== RIGHT COLUMN (60%) ==================== -->

  <text x="510" y="98" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">FEEDING HISTORY</text>

  <!-- Feeding 1 -->
  <rect x="510" y="114" width="652" height="120" rx="8" fill="#FFFFFF" stroke="#E5DDD0"/>
  <text x="530" y="140" font-size="15" font-weight="600" fill="#4A3228">Mar 18, 8:30 AM</text>
  <rect x="690" y="124" width="100" height="22" rx="11" fill="#F2EBE0"/>
  <text x="740" y="140" text-anchor="middle" font-size="11" font-weight="500" fill="#8B7355">Standard 2:2:1</text>
  <text x="530" y="166" font-size="13" fill="#8B7355">AP 125g + Rye 25g · Water: 150g (filtered) · 80°F</text>
  <text x="530" y="186" font-size="13" fill="#5E8A50">Peaked at 4.5h</text>
  <text x="720" y="186" font-size="12" fill="#8B7355">Discard: saved, ~75g</text>
  <text x="530" y="206" font-size="12" fill="#8B7355" font-style="italic">"Doubled nicely, good aroma, slight tang"</text>
  <text x="530" y="224" font-size="11" fill="#C07A2E">&#128247; 2 photos</text>

  <!-- Chain connector line -->
  <line x1="536" y1="234" x2="536" y2="252" stroke="#E5DDD0" stroke-width="2"/>

  <!-- Feeding 2 -->
  <rect x="510" y="252" width="652" height="104" rx="8" fill="#FFFFFF" stroke="#E5DDD0"/>
  <text x="530" y="278" font-size="15" font-weight="600" fill="#4A3228">Mar 17, 7:00 AM</text>
  <rect x="690" y="262" width="100" height="22" rx="11" fill="#F2EBE0"/>
  <text x="740" y="278" text-anchor="middle" font-size="11" font-weight="500" fill="#8B7355">Standard 2:2:1</text>
  <text x="530" y="304" font-size="13" fill="#8B7355">AP 125g + Rye 25g · Water: 150g (tap) · 78°F</text>
  <text x="530" y="324" font-size="13" fill="#5E8A50">Peaked at 5h</text>
  <text x="530" y="344" font-size="12" fill="#8B7355" font-style="italic">Obs: "Grew well, ready by noon"</text>

  <!-- Chain connector -->
  <line x1="536" y1="356" x2="536" y2="374" stroke="#E5DDD0" stroke-width="2"/>

  <!-- Feeding 3 -->
  <rect x="510" y="374" width="652" height="88" rx="8" fill="#FFFFFF" stroke="#E5DDD0"/>
  <text x="530" y="400" font-size="15" font-weight="600" fill="#4A3228">Mar 16, 9:00 PM</text>
  <rect x="700" y="384" width="110" height="22" rx="11" fill="#F2EBE0"/>
  <text x="755" y="400" text-anchor="middle" font-size="11" font-weight="500" fill="#8B7355">Overnight 20:20:1</text>
  <text x="530" y="426" font-size="13" fill="#8B7355">AP 150g · Water: 150g (filtered) · 76°F</text>
  <text x="530" y="446" font-size="13" fill="#5E8A50">Peaked at 8h</text>

  <!-- Chain break indicator -->
  <line x1="536" y1="462" x2="536" y2="474" stroke="#E5DDD0" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="548" y="472" font-size="10" fill="#B8A898" font-style="italic">missed a feed</text>

  <!-- Feeding 4 (after gap) -->
  <rect x="510" y="482" width="652" height="88" rx="8" fill="#FFFFFF" stroke="#E5DDD0"/>
  <text x="530" y="508" font-size="15" font-weight="600" fill="#4A3228">Mar 14, 8:00 AM</text>
  <rect x="690" y="492" width="100" height="22" rx="11" fill="#F2EBE0"/>
  <text x="740" y="508" text-anchor="middle" font-size="11" font-weight="500" fill="#8B7355">Standard 2:2:1</text>
  <text x="530" y="534" font-size="13" fill="#8B7355">AP 125g + Rye 25g · Water: 150g (tap)</text>
  <text x="530" y="554" font-size="13" fill="#5E8A50">Peaked at 4.2h</text>

  <!-- More entries indicator -->
  <text x="836" y="600" text-anchor="middle" font-size="12" fill="#D9CEBD">· · ·</text>

  <!-- ==================== BOTTOM TAB BAR ==================== -->
  <rect x="0" y="774" width="1194" height="60" fill="#F2EBE0"/>
  <line x1="0" y1="774" x2="1194" y2="774" stroke="#E5DDD0"/>

  <g transform="translate(159, 783)">
    <rect x="0" y="0" width="14" height="18" rx="2" fill="none" stroke="#8B7355" stroke-width="1.5"/>
    <rect x="4" y="-2" width="6" height="4" rx="1" fill="none" stroke="#8B7355" stroke-width="1.5"/>
    <line x1="4" y1="7" x2="10" y2="7" stroke="#8B7355" stroke-width="1"/>
    <line x1="4" y1="11" x2="10" y2="11" stroke="#8B7355" stroke-width="1"/>
    <text x="7" y="34" text-anchor="middle" font-size="11" fill="#8B7355">Bake</text>
  </g>

  <g transform="translate(556, 783)">
    <path d="M3,0 L11,0 L11,6 L15,18 L-1,18 L3,6 Z" fill="none" stroke="#C07A2E" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="3" y1="0" x2="11" y2="0" stroke="#C07A2E" stroke-width="2" stroke-linecap="round"/>
    <text x="7" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#C07A2E">Starter</text>
  </g>

  <g transform="translate(953, 783)">
    <rect x="0" y="0" width="14" height="18" rx="2" fill="none" stroke="#8B7355" stroke-width="1.5"/>
    <line x1="7" y1="0" x2="7" y2="18" stroke="#8B7355" stroke-width="1"/>
    <line x1="3" y1="5" x2="6" y2="5" stroke="#8B7355" stroke-width="0.8"/>
    <line x1="3" y1="8" x2="6" y2="8" stroke="#8B7355" stroke-width="0.8"/>
    <text x="7" y="34" text-anchor="middle" font-size="11" fill="#8B7355">Log</text>
  </g>

</svg>