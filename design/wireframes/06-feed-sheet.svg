<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1194 834"
     font-family="'Source Serif 4', 'Georgia', serif" font-size="14">

  <!-- Dimmed background -->
  <rect width="1194" height="834" fill="#FEFBF5"/>
  <rect width="1194" height="834" fill="#2A1A10" opacity="0.45"/>

  <!-- ==================== MODAL SHEET ==================== -->
  <!-- Centered modal: 560w x 660h -->
  <rect x="317" y="87" width="560" height="660" rx="16" fill="#FEFBF5"/>

  <!-- Modal header -->
  <rect x="317" y="87" width="560" height="60" rx="0" fill="#FEFBF5"/>
  <rect x="317" y="87" width="560" height="60" rx="16" fill="#FEFBF5"/>
  <rect x="317" y="115" width="560" height="32" fill="#FEFBF5"/>
  <text x="597" y="124" text-anchor="middle" font-size="18" font-weight="700" fill="#4A3228" font-family="'Fraunces', 'Georgia', serif">Record Feeding</text>
  <line x1="317" y1="147" x2="877" y2="147" stroke="#E5DDD0"/>

  <!-- Cancel / Save buttons -->
  <text x="337" y="124" font-size="14" fill="#8B7355">Cancel</text>
  <rect x="817" y="107" width="60" height="30" rx="6" fill="#C07A2E"/>
  <text x="847" y="127" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">Save</text>

  <!-- RATIO section -->
  <text x="337" y="178" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">RATIO</text>

  <!-- Ratio cards -->
  <!-- Standard 2:2:1 (selected) -->
  <rect x="337" y="190" width="160" height="56" rx="8" fill="#FDF6EC" stroke="#C07A2E" stroke-width="2"/>
  <text x="417" y="214" text-anchor="middle" font-size="14" font-weight="600" fill="#4A3228">Standard</text>
  <text x="417" y="234" text-anchor="middle" font-size="12" fill="#C07A2E">2:2:1</text>

  <!-- Overnight 20:20:1 -->
  <rect x="511" y="190" width="160" height="56" rx="8" fill="#F2EBE0" stroke="#D9CEBD" stroke-width="1"/>
  <text x="591" y="214" text-anchor="middle" font-size="14" fill="#4A3228">Overnight</text>
  <text x="591" y="234" text-anchor="middle" font-size="12" fill="#8B7355">20:20:1</text>

  <!-- Revival Protocol -->
  <rect x="685" y="190" width="160" height="56" rx="8" fill="#F2EBE0" stroke="#D9CEBD" stroke-width="1"/>
  <text x="765" y="214" text-anchor="middle" font-size="14" fill="#4A3228">Revival</text>
  <text x="765" y="234" text-anchor="middle" font-size="12" fill="#8B7355">Protocol</text>

  <!-- AMOUNTS section -->
  <text x="337" y="282" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">AMOUNTS</text>

  <!-- Flour -->
  <text x="337" y="314" font-size="14" fill="#8B7355">Flour</text>
  <rect x="500" y="298" width="120" height="36" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="540" y="322" text-anchor="middle" font-size="15" font-weight="600" fill="#4A3228">150</text>
  <text x="630" y="322" font-size="14" fill="#8B7355">g</text>

  <!-- Water -->
  <text x="337" y="360" font-size="14" fill="#8B7355">Water</text>
  <rect x="500" y="344" width="120" height="36" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="540" y="368" text-anchor="middle" font-size="15" font-weight="600" fill="#4A3228">150</text>
  <text x="630" y="368" font-size="14" fill="#8B7355">g</text>

  <!-- Starter -->
  <text x="337" y="406" font-size="14" fill="#8B7355">Starter</text>
  <rect x="500" y="390" width="120" height="36" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="540" y="414" text-anchor="middle" font-size="15" font-weight="600" fill="#4A3228">75</text>
  <text x="630" y="414" font-size="14" fill="#8B7355">g</text>

  <line x1="337" y1="442" x2="857" y2="442" stroke="#E5DDD0"/>

  <!-- TEMPERATURES section (optional) -->
  <text x="337" y="468" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">TEMPERATURES</text>
  <text x="680" y="468" font-size="11" fill="#8B7355" font-style="italic">optional</text>

  <!-- Flour temp -->
  <text x="337" y="500" font-size="14" fill="#8B7355">Flour temp</text>
  <rect x="500" y="484" width="120" height="36" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="540" y="508" text-anchor="middle" font-size="15" font-weight="600" fill="#4A3228">68</text>
  <text x="630" y="508" font-size="14" fill="#8B7355">°F</text>

  <!-- Room temp -->
  <text x="337" y="546" font-size="14" fill="#8B7355">Room temp</text>
  <rect x="500" y="530" width="120" height="36" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="540" y="554" text-anchor="middle" font-size="15" font-weight="600" fill="#4A3228">72</text>
  <text x="630" y="554" font-size="14" fill="#8B7355">°F</text>

  <line x1="337" y1="582" x2="857" y2="582" stroke="#E5DDD0"/>

  <!-- NOTES -->
  <text x="337" y="606" font-size="11" font-weight="600" fill="#8B7355" letter-spacing="1.2">NOTES</text>
  <rect x="337" y="618" width="520" height="56" rx="6" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="353" y="644" font-size="13" fill="#B8A898">Used KA bread flour + rye...</text>

  <!-- Reminder checkbox -->
  <rect x="337" y="690" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#D9CEBD"/>
  <text x="361" y="703" font-size="13" fill="#8B7355">Set reminder for peak check (4h)</text>

</svg>
